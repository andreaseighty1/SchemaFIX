// -------- Edit Modal --------

function StaffEditModal({ staff, departments, passBank, fridayCycleWeeks, fridayTemplateRotation, onSave, onClose, onRemove }) {
  const [form, setForm] = useState(() => {
    return normalizePerson(JSON.parse(JSON.stringify(staff)), fridayCycleWeeks);
  });
  const wm = weeklyMinutes(form, fridayCycleWeeks, fridayTemplateRotation);
  const targetMin = getTargetMin(form);
  const diff = wm - targetMin;
  const off = hasWeekdaySchedule(form) && Math.abs(diff) > 5;
  const dept = getDept(form.deptId, departments);
  const effectiveFridayRotation = buildEffectiveFridayRotation(form, fridayCycleWeeks, fridayTemplateRotation);
  const fixedFridayOff = !form.hasFridayRotation && !form.fridayShift;
  const normalizedPassBank = normalizePassBank(passBank);
  const effectiveAllowedPassIds = getAllowedPassIdsForPerson(form, normalizedPassBank);
  const usingAllPasses = (form.allowedPassIds || []).length === 0;

  // Uppdatera en enskild fredagsvecka i rullen
  const updateFridayWeek = (weekIdx, idx, val) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    const cur = next[weekIdx] || ['',''];
    next[weekIdx] = idx === 0 ? [val, cur[1]] : [cur[0], val];
    if (!next[weekIdx][0] && !next[weekIdx][1]) next[weekIdx] = null;
    setForm({ ...form, fridayRotation: next });
  };
  const setWeekOff = (weekIdx, off) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    next[weekIdx] = off ? null : ['07:00','15:30'];
    setForm({ ...form, fridayRotation: next });
  };
  const updateFridayTemplateOverride = (weekIdx, idx, val) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    const base = getTemplateFridayShift(fridayTemplateRotation, weekIdx + 1, form.fridayTemplateStartWeek || 1, fridayCycleWeeks);
    const cur = hasFridayTemplateOverride(form, weekIdx + 1)
      ? (nextOverrides[week] || ['',''])
      : (base || ['','']);
    const next = idx === 0 ? [val, cur[1] || ''] : [cur[0] || '', val];
    nextOverrides[week] = (!next[0] && !next[1]) ? null : next;
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const resetFridayTemplateOverride = (weekIdx) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    delete nextOverrides[week];
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const setTemplateWeekOff = (weekIdx, off) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    if (!off) {
      delete nextOverrides[week];
    } else {
      nextOverrides[week] = null;
    }
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const enableFridayTemplateWeek = (weekIdx) => {
    const week = String(weekIdx + 1);
    const nextOverrides = { ...(form.fridayTemplateOverrides || {}) };
    const base = getTemplateFridayShift(fridayTemplateRotation, weekIdx + 1, form.fridayTemplateStartWeek || 1, fridayCycleWeeks);
    nextOverrides[week] = base || ['07:00','15:30'];
    setForm({ ...form, fridayTemplateOverrides: nextOverrides });
  };
  const switchToManualFridayRotation = () => {
    setForm({
      ...form,
      fridayUseTemplate: false,
      fridayRotation: effectiveFridayRotation,
      fridayTemplateOverrides: form.fridayTemplateOverrides || {},
    });
  };
  const switchToTemplateFridayRotation = () => {
    setForm({
      ...form,
      fridayUseTemplate: true,
      fridayTemplateStartWeek: Math.min(Math.max(1, form.fridayTemplateStartWeek || 1), fridayCycleWeeks),
      fridayTemplateOverrides: form.fridayTemplateOverrides || {},
    });
  };
  const setFixedFridayOff = (off) => {
    setForm({ ...form, fridayShift: off ? null : (form.fridayShift || ['07:45','15:45']) });
  };
  const scrollToFridaySection = () => {
    document.getElementById('staff-edit-friday-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  const autofillWeekSchedule = () => {
    setForm(preparePersonForUse(form, fridayCycleWeeks, fridayTemplateRotation, normalizedPassBank));
  };
  const toggleAllowedPass = (passId) => {
    const current = normalizeAllowedPassIds(form.allowedPassIds);
    const allIds = normalizedPassBank.map(pass => pass.id);
    let next;
    if (current.length === 0) {
      next = allIds.filter(id => id !== passId);
    } else if (current.includes(passId)) {
      if (current.length === 1) return;
      next = current.filter(id => id !== passId);
    } else {
      next = [...current, passId];
    }
    if (next.length === allIds.length) next = [];
    setForm({ ...form, allowedPassIds: next });
  };
  const selectAllPasses = () => setForm({ ...form, allowedPassIds: [] });
  const selectSuggestedPasses = () => {
    const suggestion = normalizedPassBank
      .filter(pass => (!form.onlyAfternoons || pass.start >= 720) && (!pass.deptId || pass.deptId === form.deptId))
      .filter(pass => WEEKDAY_KEYS.some(dayKey => pass.days.includes(dayKey) && isShiftLegal(form, dayKey, passToShift(pass))))
      .map(pass => pass.id);
    setForm({ ...form, allowedPassIds: suggestion.length === normalizedPassBank.length ? [] : suggestion });
  };

  const updateShift = (day, idx, val) => {
    const newSched = { ...form.sched };
    if (!newSched[day]) newSched[day] = ['',''];
    newSched[day] = [...newSched[day]];
    newSched[day][idx] = val;
    setForm({ ...form, sched: newSched });
  };
  const toggleDayOff = (day) => {
    const cur = form.daysOff || [];
    setForm({ ...form, daysOff: cur.includes(day) ? cur.filter(d => d !== day) : [...cur, day] });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-stone-200 px-6 py-4 flex items-center justify-between z-10">
          <div>
            <h2 className="display-font text-2xl text-stone-800">{form.name}</h2>
            <p className="text-xs text-stone-500">{dept.name}{form.role ? ` · ${form.role}` : ''}</p>
          </div>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-700"><X size={20} /></button>
        </div>

        <div className="p-6 space-y-6">
          {/* Grunduppgifter */}
          <Section title="Grunduppgifter">
            <div className="grid grid-cols-2 gap-4">
              <Field label="Namn"><input className="input" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></Field>
              <Field label="Roll/undervisning"><input className="input" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })} placeholder="ex. åk 1, musik" /></Field>
              <Field label="Avdelning">
                <select className="input" value={form.deptId || ''} onChange={e => setForm({ ...form, deptId: e.target.value })}>
                  {departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                </select>
              </Field>
              <div></div>
            </div>
            <div className="mt-4">
              <p className="text-xs text-stone-600 mb-2" style={{ fontWeight: 500 }}>Tjänstgöring</p>
              <div className="grid grid-cols-2 gap-4">
                <Field label="Heltid på arbetsplats"
                  tip="Antal timmar per vecka som motsvarar 100% tjänstgöring i denna roll. För fritidspedagog brukar det vara 37,5 — andra yrkesgrupper kan ha annan heltid.">
                  <div className="flex items-center gap-2">
                    <input type="number" min="0" max="50" step="0.25" className="input flex-1"
                      value={form.fullTimeHours ?? 37.5}
                      onChange={e => setForm({ ...form, fullTimeHours: parseFloat(e.target.value) || 0 })} />
                    <span className="text-xs text-stone-500">timmar</span>
                  </div>
                  <p className="text-[10px] text-stone-400 mt-1">t.ex. 37,5h för fritidspedagog</p>
                </Field>
                <Field label="Tjänstgöringsgrad"
                  tip="Hur stor andel av heltid personen arbetar. Ange 100 för heltid, 75 för deltid 75% osv. Veckotidsmålet räknas automatiskt: tjänstgöring × heltid.">
                  <div className="flex items-center gap-2">
                    <input type="number" min="0" max="200" step="1" className="input flex-1"
                      value={form.percent ?? 100}
                      onChange={e => setForm({ ...form, percent: parseFloat(e.target.value) || 0 })} />
                    <span className="text-xs text-stone-500">%</span>
                  </div>
                  <p className="text-[10px] text-stone-400 mt-1">100% = heltid, 75% = 75% av heltid osv</p>
                </Field>
              </div>
              <div className="mt-2 bg-stone-50 rounded p-2 text-xs text-stone-600">
                Beräknat veckotidsmål: <span className="text-stone-800 tabular-nums" style={{ fontWeight: 500 }}>{minToHM(targetMin)}</span>
              </div>
            </div>
          </Section>

          <Section title="Regler och pass">
            <p className="text-xs text-stone-500 mb-3">
              Det här är kärnan i generatorn: vilka pass personen får ta och vilka tider som måste respekteras.
            </p>
            <div className="rounded-xl bg-stone-50 ring-1 ring-stone-200 p-4">
              <div className="flex items-start justify-between gap-3 flex-wrap">
                <div>
                  <p className="text-xs uppercase tracking-wider text-stone-500">Tillåtna pass</p>
                  <p className="text-sm text-stone-600 mt-1">
                    Välj om personen får alla pass i banken eller bara vissa specifika. Generatorn håller sig till det här urvalet på vardagar.

                  <button type="button" onClick={selectAllPasses}

                    Alla pass
                  </button>
                  <button type="button" onClick={selectSuggestedPasses}
                    className="text-[11px] px-3 py-1.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition">
                    Föreslå urval

              <div className="mt-3 grid sm:grid-cols-2 gap-2">

                  </Field>

// Editor för dagsspecifika undantag — listar de dagar som har undantag och låter
// användaren lägga till nya. Varje undantag kan sätta valfritt av de fyra fälten.
function DayOverridesEditor({ form, setForm }) {
  const overrides = form.dayOverrides || {};
  const overrideKeys = Object.keys(overrides).filter(k => overrides[k]);
  const availableDays = DAYS.filter(d => !overrideKeys.includes(d.key));

  const FIELDS = [
    { key: 'earliestStart', label: 'Tidigast börja' },
    { key: 'latestStart',   label: 'Måste börja senast' },
    { key: 'earliestEnd',   label: 'Måste jobba minst till' },
    { key: 'latestEnd',     label: 'Senast sluta' },
  ];

  const setField = (dayKey, fieldKey, val) => {
    const next = { ...overrides };
    next[dayKey] = { ...(next[dayKey] || {}) };
    if (val === '' || val == null) delete next[dayKey][fieldKey];
    else next[dayKey][fieldKey] = timeToMin(val);
    // Om alla fält tomma, ta bort dagen helt
    if (Object.keys(next[dayKey]).length === 0) delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  const addOverride = (dayKey) => {
    const next = { ...overrides };
    next[dayKey] = {};
    setForm({ ...form, dayOverrides: next });
  };

  const removeOverride = (dayKey) => {
    const next = { ...overrides };
    delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  return (
    <div className="space-y-3">
      {overrideKeys.length === 0 && (
        <p className="text-xs text-stone-400 italic">Inga dagsundantag än.</p>
      )}
      {overrideKeys.map(dayKey => {
        const dayLabel = DAYS.find(d => d.key === dayKey)?.label;
        const ov = overrides[dayKey] || {};
        const general = {
          earliestStart: form.earliestStart, latestStart: form.latestStart,
          earliestEnd:   form.earliestEnd,   latestEnd:   form.latestEnd,
        };
        return (
          <div key={dayKey} className="bg-stone-50 rounded-lg p-3 ring-1 ring-stone-200">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm text-stone-800" style={{ fontWeight: 500 }}>{dayLabel}</span>
              <button type="button" onClick={() => removeOverride(dayKey)}
                className="text-xs text-stone-500 hover:text-red-600 flex items-center gap-1">
                <Trash2 size={12} />Ta bort undantag
              </button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {FIELDS.map(f => {
                const val = ov[f.key];
                const generalVal = general[f.key];
                const isOverriding = val != null;
                return (
                  <div key={f.key}>
                    <label className="text-[10px] text-stone-600 block mb-0.5">
                      {f.label}
                      {!isOverriding && generalVal != null && (
                        <span className="text-stone-400"> (generellt: {minToTime(generalVal)})</span>
                      )}
                    </label>
                    <div className="flex items-center gap-1">
                      <input type="time" className="input flex-1"
                        value={val != null ? minToTime(val) : ''}
                        onChange={e => setField(dayKey, f.key, e.target.value)} />
                      {isOverriding && (
                        <button type="button" onClick={() => setField(dayKey, f.key, '')}
                          className="text-xs text-stone-400 hover:text-stone-700 px-1" title="Ta bort detta fält">×</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="text-[10px] text-stone-500 mt-2">Tomt fält = använd den generella regeln för det fältet.</p>
          </div>
        );
      })}
      {availableDays.length > 0 && (
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-stone-500">Lägg till undantag för:</span>
          {availableDays.map(d => (
            <button key={d.key} type="button" onClick={() => addOverride(d.key)}
              className="text-xs px-2.5 py-1 rounded-full bg-stone-100 text-stone-700 hover:bg-stone-200 transition flex items-center gap-1">
              <Plus size={10} />{d.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// Editor för paritetsundantag — låter användaren sätta olika regler för jämna/udda kalenderveckor.
function ParityOverridesEditor({ form, setForm }) {
  const overrides = form.parityOverrides || {};

  const FIELDS = [
    { key: 'earliestStart', label: 'Tidigast börja' },
    { key: 'latestStart',   label: 'Måste börja senast' },
    { key: 'earliestEnd',   label: 'Måste jobba minst till' },
    { key: 'latestEnd',     label: 'Senast sluta' },
  ];

  const PARITIES = [
    { key: 'even', label: 'Jämn vecka', sub: 'v.18, 20, 22 osv' },
    { key: 'odd',  label: 'Udda vecka', sub: 'v.17, 19, 21 osv' },
  ];

  const setField = (parKey, fieldKey, val) => {
    const next = { ...overrides };
    next[parKey] = { ...(next[parKey] || {}) };
    if (val === '' || val == null) delete next[parKey][fieldKey];
    else next[parKey][fieldKey] = timeToMin(val);
    if (Object.keys(next[parKey]).length === 0) delete next[parKey];
    setForm({ ...form, parityOverrides: next });
  };

  const clearParity = (parKey) => {
    const next = { ...overrides };
    delete next[parKey];
    setForm({ ...form, parityOverrides: next });
  };

  const general = {
    earliestStart: form.earliestStart, latestStart: form.latestStart,
    earliestEnd:   form.earliestEnd,   latestEnd:   form.latestEnd,
  };

  return (
    <div className="grid md:grid-cols-2 gap-3">
      {PARITIES.map(par => {
        const ov = overrides[par.key] || {};
        const hasAny = Object.keys(ov).length > 0;
        return (
          <div key={par.key} className={`rounded-lg p-3 ring-1 ${hasAny ? 'bg-stone-50 ring-stone-200' : 'bg-white ring-stone-100'}`}>
            <div className="flex items-center justify-between mb-2">
              <div>
                <span className="text-sm text-stone-800" style={{ fontWeight: 500 }}>{par.label}</span>
                <span className="text-[10px] text-stone-500 ml-1.5">{par.sub}</span>
              </div>
              {hasAny && (
                <button type="button" onClick={() => clearParity(par.key)}
                  className="text-xs text-stone-500 hover:text-red-600 flex items-center gap-1">
                  <Trash2 size={11} />Rensa
                </button>
              )}
            </div>
            <div className="space-y-2">
              {FIELDS.map(f => {
                const val = ov[f.key];
                const generalVal = general[f.key];
                const isOverriding = val != null;
                return (
                  <div key={f.key}>
                    <label className="text-[10px] text-stone-600 block mb-0.5">
                      {f.label}
                      {!isOverriding && generalVal != null && (
                        <span className="text-stone-400"> (generellt: {minToTime(generalVal)})</span>
                      )}
                    </label>
                    <div className="flex items-center gap-1">
                      <input type="time" className="input flex-1"
                        value={val != null ? minToTime(val) : ''}
                        onChange={e => setField(par.key, f.key, e.target.value)} />
                      {isOverriding && (
                        <button type="button" onClick={() => setField(par.key, f.key, '')}
                          className="text-xs text-stone-400 hover:text-stone-700 px-1" title="Ta bort detta fält">×</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

                <p className="text-[10px] uppercase tracking-wider text-stone-500">Testscenario</p>
                <h3 className="display-font text-xl text-stone-800 mt-1">{scenario.name}</h3>
                <p className="text-sm text-stone-600 mt-2 leading-relaxed">{scenario.description}</p>
                <div className="mt-4 grid grid-cols-2 gap-2 text-xs text-stone-600">
                  <div className="bg-white rounded-lg px-3 py-2 ring-1 ring-stone-200">
                    <span style={{ fontWeight: 500 }}>{scenario.staff.length}</span> personer
                  </div>
                  <div className="bg-white rounded-lg px-3 py-2 ring-1 ring-stone-200">
                    <span style={{ fontWeight: 500 }}>{scenario.departments.length}</span> avdelningar
                  </div>
                  <div className="bg-white rounded-lg px-3 py-2 ring-1 ring-stone-200">
                    <span style={{ fontWeight: 500 }}>{passCount}</span> pass
                  </div>
                  <div className="bg-white rounded-lg px-3 py-2 ring-1 ring-stone-200">
                    <span style={{ fontWeight: 500 }}>{sharedBlocks}</span> gemensamma block
                  </div>
                  <div className="bg-white rounded-lg px-3 py-2 ring-1 ring-stone-200">
                    <span style={{ fontWeight: 500 }}>{deptBlocks}</span> avdelningsblock
                  </div>
                </div>
                <p className="text-[11px] text-stone-500 mt-3">
                  {rotating > 0
                    ? `${rotating} personer använder fredagsrull eller mall`
                    : 'Ingen fredagstid är förifylld på individnivå'}
                </p>
                <p className="text-[11px] text-stone-400 mt-1">Klicka för att ladda detta scenario.</p>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const currentSummary = summarizeSchedule(currentStaff, coverageScopes, fridayCycleWeeks, fridayTemplateRotation);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28, 25, 23, 0.5)' }} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[92vh] overflow-y-auto" onClick={e => e.stopPropagation()}>

              const isSelected = previewIdx === i;
              const better = (a, b) => a < b ? 'text-emerald-700' : a > b ? 'text-orange-600' : 'text-stone-600';
              return (
                <button key={i} onClick={() => setPreviewIdx(i)}

                  <p className={`text-xs mt-1 ${isSelected ? 'text-stone-300' : 'text-stone-500'}`}>{alt.desc}</p>
                  <div className="mt-3 pt-3 border-t border-stone-200/30 space-y-1 text-xs">
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Täckningsgap:</span>

                        {alt.summary.totalGaps} {alt.summary.totalGapMinutes > 0 && `(${alt.summary.totalGapMinutes} min)`}

                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Pers. m. tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.peopleOff, currentSummary.peopleOff)} style={{ fontWeight: 500 }}>
                        {alt.summary.peopleOff} pers.
                      </span>
                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Total tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.totalHourDev, currentSummary.totalHourDev)} style={{ fontWeight: 500 }}>
                        {minToHM(alt.summary.totalHourDev)}

                </button>

          {/* Comparison vs current */}

          </div>
        </div>

function PreviewSchedule({ staff, originalStaff, coverageScopes, departments }) {
  const origMap = Object.fromEntries(originalStaff.map(p => [p.id, p]));
  return (
    <div className="space-y-4">
      <p className="text-xs uppercase tracking-wider text-stone-500">Förhandsgranskning · ändringar markerade i färg</p>
      {DAYS.map(d => {
        const present = staff.filter(s => s.sched[d.key] && !(s.daysOff || []).includes(d.key))
          .map(s => ({ ...s, startMin: timeToMin(s.sched[d.key][0]), endMin: timeToMin(s.sched[d.key][1]) }))
          .sort((a, b) => a.startMin - b.startMin);
        const gaps = coverageScopes.reduce((sum, scope) => {
          const slots = computeSlots(staff, d.key, scope.slots, scope);
          return sum + slots.filter(s => s.count < s.min).length;
        }, 0);
        return (
          <div key={d.key} className="bg-white ring-1 ring-stone-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{d.label}</p>
              <span className={`text-[10px] px-2 py-0.5 rounded ${gaps === 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-orange-50 text-orange-700'}`}>
                {gaps === 0 ? 'Täcker krav' : `${gaps} gap`}
              </span>
            </div>
            <div className="space-y-0.5">
              {present.map(p => {
                const orig = origMap[p.id];
                const origSh = orig.sched[d.key];
                const changed = !origSh || origSh[0] !== p.sched[d.key][0] || origSh[1] !== p.sched[d.key][1];
                const dept = getDept(p.deptId, departments);
                const soft = softColor(dept.color);
                return (
                  <div key={p.id} className="flex items-center text-xs">
                    <span className="w-24 text-right pr-2 text-stone-700 truncate">{p.name}</span>
                    <div className="flex-1 relative h-5 bg-stone-50 rounded">
                      <div className="absolute h-full rounded flex items-center px-1.5"
                        style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                          backgroundColor: changed ? '#fef3c7' : soft, borderLeft: `2px solid ${changed ? '#d97706' : dept.color}` }}>
                        <span className="text-[10px] truncate text-stone-700">
                          {p.sched[d.key][0]}–{p.sched[d.key][1]}
                          {changed && <span className="text-amber-700 ml-1">★</span>}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ==================== SCHEDULE GENERATOR (Simulated Annealing) ====================

function personMatchesCoverageScope(person, scope) {
  return scope.scopeType !== COVERAGE_DEPARTMENT || person.deptId === scope.deptId;
}

function getShiftForDay(person, dayKey, options = {}) {
  if (dayKey === 'fri') {
    return getFridayShift(person, options.fridayWeek || 1, options.cycleWeeks || 8, options.fridayTemplateRotation || []);
  }
  return person.sched?.[dayKey] || null;
}

function computeSlots(staff, dayKey, coverageSlots, scope = { scopeType: COVERAGE_SHARED, deptId: null }, options = {}) {
  return coverageSlots.map(slot => {
    let count = 0;
    for (const p of staff) {
      if (!personMatchesCoverageScope(p, scope)) continue;
      const sh = getShiftForDay(p, dayKey, options);
      if (!sh) continue;
      const start = timeToMin(sh[0]);
      const end = timeToMin(sh[1]);
      if (start <= slot.start && end > slot.start) count++;
    }
    return { ...slot, count };
  });
}

function scheduleScore(staff, coverageScopes, cycleWeeks, fridayTemplateRotation, weights = { gap: 30, hours: 2, over: 1 }) {
  let score = 0;
  // Hour target
  for (const p of staff) {
    const wm = weeklyMinutes(p, cycleWeeks, fridayTemplateRotation);
    score -= Math.abs(wm - getTargetMin(p)) * weights.hours;
  }
  // Coverage (mån-tor)
  for (const d of DAYS) {
    for (const scope of coverageScopes) {
      const slots = computeSlots(staff, d.key, scope.slots, scope);
      for (const s of slots) {
        if (s.count < s.min) score -= (s.min - s.count) ** 2 * weights.gap;
        if (s.count > s.min + 2) score -= (s.count - s.min - 2) * weights.over;
      }
    }
  }
  // Coverage (fredag) räknas som snitt över rullen så fredagen väger som en vanlig veckodag.
  if (cycleWeeks > 0) {
    let fridayPenalty = 0;
    for (let week = 1; week <= cycleWeeks; week++) {
      for (const scope of coverageScopes) {
        const slots = computeSlots(staff, 'fri', scope.slots, scope, { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
        for (const s of slots) {
          if (s.count < s.min) fridayPenalty += (s.min - s.count) ** 2 * weights.gap;
          if (s.count > s.min + 2) fridayPenalty += (s.count - s.min - 2) * weights.over;
        }
      }
    }
    score -= fridayPenalty / cycleWeeks;
  }
  return score;
}

function isShiftLegal(person, dayKey, newShift) {
  const start = timeToMin(newShift[0]);
  const end = timeToMin(newShift[1]);
  if (start === null || end === null) return false;
  if (end - start < 60) return false;
  if (start < 330 || end > 1080) return false;
  if (person.onlyAfternoons && start < 720) return false;
  const strict = getStrictConstraints(person, dayKey);
  if (Number.isFinite(strict.earliestStart) && start < strict.earliestStart) return false;
  if (Number.isFinite(strict.latestStart)   && start > strict.latestStart)   return false;
  if (Number.isFinite(strict.earliestEnd)   && end   < strict.earliestEnd)   return false;
  if (Number.isFinite(strict.latestEnd)     && end   > strict.latestEnd)     return false;
  if ((person.daysOff || []).includes(dayKey)) return false;
  return true;
}

function attemptMutation(staff, passBank = [], cycleWeeks = 8, fridayTemplateRotation = []) {
  const mutables = staff.filter(p => !p.fixedTimes);
  if (mutables.length === 0) return null;
  const p = mutables[Math.floor(Math.random() * mutables.length)];
  const validDays = DAYS.filter(d => !(p.daysOff || []).includes(d.key));
  if (validDays.length === 0) return null;
  const d = validDays[Math.floor(Math.random() * validDays.length)];
  const eligiblePasses = getEligiblePassesForDay(p, d.key, passBank);
  if (eligiblePasses.length === 0) return null;
  const current = normalizeShift(p.sched?.[d.key]);
  const possibleShifts = eligiblePasses
    .map(passToShift)
    .filter(shift => !current || shift[0] !== current[0] || shift[1] !== current[1]);
  if (possibleShifts.length === 0) return null;
  const preferred = buildSuggestedShift(p, d.key, cycleWeeks, fridayTemplateRotation, passBank);
  const sorted = possibleShifts.sort((a, b) => {
    if (!preferred) return 0;
    const scoreA = Math.abs(timeToMin(a[0]) - timeToMin(preferred[0])) + Math.abs(dayMinutes(a) - dayMinutes(preferred));
    const scoreB = Math.abs(timeToMin(b[0]) - timeToMin(preferred[0])) + Math.abs(dayMinutes(b) - dayMinutes(preferred));
    return scoreA - scoreB;
  });
  const newShift = Math.random() < 0.7 ? sorted[0] : sorted[Math.floor(Math.random() * sorted.length)];

  return staff.map(person => person.id === p.id
    ? { ...person, sched: { ...person.sched, [d.key]: newShift } }
    : person
  );
}

function yieldToBrowser() {
  return new Promise(resolve => {
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(() => resolve());
      return;
    }
    setTimeout(resolve, 0);
  });
}

async function runSearchAsync(initialStaff, coverageScopes, cycleWeeks, fridayTemplateRotation, passBank, weights, iterations = 2500, options = {}) {
  const { chunkSize = 100, onProgress } = options;
  let current = initialStaff.map(p => ({ ...p, sched: { ...p.sched } }));
  let currentScore = scheduleScore(current, coverageScopes, cycleWeeks, fridayTemplateRotation, weights);
  let best = current;
  let bestScore = currentScore;
  let temp = 80;
  const coolRate = 0.9985;

  for (let chunkStart = 0; chunkStart < iterations; chunkStart += chunkSize) {
    const chunkEnd = Math.min(iterations, chunkStart + chunkSize);
    for (let i = chunkStart; i < chunkEnd; i++) {
      const cand = attemptMutation(current, passBank, cycleWeeks, fridayTemplateRotation);
      if (!cand) continue;
      const cs = scheduleScore(cand, coverageScopes, cycleWeeks, fridayTemplateRotation, weights);
      const delta = cs - currentScore;
      if (delta >= 0 || Math.random() < Math.exp(delta / temp)) {
        current = cand;
        currentScore = cs;
        if (cs > bestScore) { best = cand; bestScore = cs; }
      }
      temp *= coolRate;
    }
    if (onProgress) onProgress(chunkEnd / iterations);
    if (chunkEnd < iterations) await yieldToBrowser();
  }
  return best;
}

function summarizeSchedule(staff, coverageScopes, cycleWeeks, fridayTemplateRotation = []) {
  let totalGaps = 0, totalGapMinutes = 0;
  for (const d of DAYS) {
    for (const scope of coverageScopes) {
      const slots = computeSlots(staff, d.key, scope.slots, scope);
      for (const s of slots) if (s.count < s.min) { totalGaps++; totalGapMinutes += 15 * (s.min - s.count); }
    }
  }
  if (cycleWeeks > 0) {
    let fridayGaps = 0;
    let fridayGapMinutes = 0;
    for (let week = 1; week <= cycleWeeks; week++) {
      for (const scope of coverageScopes) {
        const slots = computeSlots(staff, 'fri', scope.slots, scope, { fridayWeek: week, cycleWeeks, fridayTemplateRotation });
        for (const s of slots) {
          if (s.count < s.min) {
            fridayGaps++;
            fridayGapMinutes += 15 * (s.min - s.count);
          }
        }
      }
    }
    totalGaps += Math.round(fridayGaps / cycleWeeks);
    totalGapMinutes += Math.round(fridayGapMinutes / cycleWeeks);
  }
  let totalHourDev = 0, peopleOff = 0;
  for (const p of staff) {
    const dev = weeklyMinutes(p, cycleWeeks, fridayTemplateRotation) - getTargetMin(p);
    totalHourDev += Math.abs(dev);
    if (Math.abs(dev) > 5) peopleOff++;
  }
  return { totalGaps, totalGapMinutes, totalHourDev, peopleOff };
}

async function generateAlternativesAsync(initialStaff, coverageScopes, cycleWeeks, fridayTemplateRotation, passBank, onProgress) {
  const variants = [
    { label: 'Bemannings­fokus', desc: 'Prioriterar att alla pass är täckta', weights: { gap: 50, hours: 1, over: 1 } },
    { label: 'Tim­fokus',        desc: 'Prioriterar exakta veckotimmar',     weights: { gap: 15, hours: 5, over: 1 } },
    { label: 'Balanserat',       desc: 'Väger båda målen lika',                weights: { gap: 30, hours: 2, over: 1 } },
  ];
  const results = [];
  for (let i = 0; i < variants.length; i++) {
    const v = variants[i];
    const result = await runSearchAsync(
      initialStaff,
      coverageScopes,
      cycleWeeks,
      fridayTemplateRotation,
      passBank,
      v.weights,
      2500,
      {
        chunkSize: 100,
        onProgress: (variantProgress) => {
          if (!onProgress) return;
          const overall = ((i + variantProgress) / variants.length) * 100;
          onProgress({
            percent: Math.max(3, Math.min(100, Math.round(overall))),
            label: `${v.label} · ${Math.round(variantProgress * 100)} %`,
            detail: `Tar fram alternativ ${i + 1} av ${variants.length}`,
          });
        },
      }
    );
    results.push({
      ...v,
      staff: result,
      summary: summarizeSchedule(result, coverageScopes, cycleWeeks, fridayTemplateRotation),
    });
    if (i < variants.length - 1) await yieldToBrowser();
  }
  return results;
}

// ==================== UI ====================

const TIMELINE_START = 330;
const TIMELINE_END   = 1080;
const TIMELINE_RANGE = TIMELINE_END - TIMELINE_START;
const pctFromMin = m => ((m - TIMELINE_START) / TIMELINE_RANGE) * 100;

let nextId = 100;

function FritidsSchemaApp() {
  const [staff, setStaff] = useState(initialStaff);
  const [departments, setDepartments] = useState(initialDepartments);
  const [coverageBlocks, setCoverageBlocks] = useState(initialCoverageBlocks);
  const [passBank, setPassBank] = useState(() => normalizePassBank(initialPassBank));
  const [fridayCycleWeeks, setFridayCycleWeeksRaw] = useState(8);
  const [fridayTemplateRotation, setFridayTemplateRotation] = useState(initialFridayTemplateRotation);
  const [currentFridayWeek, setCurrentFridayWeek] = useState(1);
  const normalizedCoverageBlocks = useMemo(
    () => normalizeCoverageBlocks(coverageBlocks, departments),
    [coverageBlocks, departments]
  );
  const coverageScopes = useMemo(
    () => buildCoverageScopes(normalizedCoverageBlocks, departments),
    [normalizedCoverageBlocks, departments]
  );
  const [activeDay, setActiveDay] = useState('mon');
  const [view, setView] = useState('schedule');
  const [editingId, setEditingId] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [generationProgress, setGenerationProgress] = useState({ percent: 0, label: '', detail: '' });
  const [alternatives, setAlternatives] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [dirty, setDirty] = useState(false);
  const [savedFileName, setSavedFileName] = useState(null);
  // Referens till en öppnad fil (File System Access API). Kan inte sparas i localStorage,
  // så den nollställs vid ny session — men då fortsätter Spara att fungera (faller tillbaka till nedladdning).
  const [fileHandle, setFileHandle] = useState(null);
  const [showWelcome, setShowWelcome] = useState(false);
  const [showExamplePicker, setShowExamplePicker] = useState(false);
  const [tourStep, setTourStep] = useState(null); // null = ingen tur aktiv, annars 0..3

  // När cykellängden ändras: justera alla personers fridayRotation till rätt längd,
  // och håll currentFridayWeek inom giltigt intervall.
  const setFridayCycleWeeks = (n) => {
    const clamped = Math.max(1, Math.min(20, n || 1));
    setFridayCycleWeeksRaw(clamped);
    setStaff(prev => prev.map(s => ({
      ...s,
      fridayRotation: s.hasFridayRotation
        ? resizeRotation(s.fridayRotation, clamped)
        : s.fridayRotation,
      fridayTemplateStartWeek: Math.min(Math.max(1, s.fridayTemplateStartWeek || 1), clamped),
      fridayTemplateOverrides: Object.fromEntries(
        Object.entries(s.fridayTemplateOverrides || {}).filter(([week]) => parseInt(week, 10) <= clamped)
      ),
    })));
    setFridayTemplateRotation(prev => resizeRotation(prev, clamped));
    setCurrentFridayWeek(w => Math.min(Math.max(1, w), clamped));
  };

  // ----- Persistens -----
  // Autospar i localStorage som backup. Den primära "sanningen" är dock filen
  // som användaren själv exporterar/importerar — så data följer med mellan datorer/kollegor.
  const STORAGE_KEY = 'fritids-schema-v1';

  // Ladda backup vid start
  useEffect(() => {
    let foundData = false;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          foundData = true;
          const data = JSON.parse(raw);
          if (data.staff) {
          const normalizedStaff = normalizeStaffList(data.staff, data.fridayCycleWeeks || 8);
          setStaff(normalizedStaff);
          if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
        }
        const loadedDepartments = data.departments || initialDepartments;
        if (data.departments) setDepartments(loadedDepartments);
        if (data.coverageBlocks) setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks, loadedDepartments));
        setPassBank(normalizePassBank(data.passBank || initialPassBank));
        if (data.fridayCycleWeeks) setFridayCycleWeeksRaw(data.fridayCycleWeeks);
        setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
        if (data.savedFileName) setSavedFileName(data.savedFileName);
      }
    } catch {}
    // Visa välkomstvyn endast vid allra första besöket — tom localStorage
    const hasSeenWelcome = localStorage.getItem('schemafix-welcome-seen');
    if (!foundData && !hasSeenWelcome) {
      setShowWelcome(true);
    }
    setLoaded(true);
  }, []);

  const dismissWelcome = () => {
    localStorage.setItem('schemafix-welcome-seen', '1');
    setShowWelcome(false);
  };

  const startTour = () => {
    dismissWelcome();
    setView('settings');
    setTourStep(0);
  };

  const nextTourStep = () => {
    const tour = [
      { view: 'settings' },  // 0: avdelningar
      { view: 'staff' },     // 1: personal
      { view: 'rules' },     // 2: bemanningskrav
      { view: 'schedule' },  // 3: vecka + generera
    ];
    const next = (tourStep ?? -1) + 1;
    if (next >= tour.length) {
      setTourStep(null);
      return;
    }
    setView(tour[next].view);
    setTourStep(next);
  };

  const endTour = () => setTourStep(null);

  // Autospar till localStorage vid varje ändring + markera som "ändrat sedan senaste filsparning"
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        staff: normalizeStaffList(staff, fridayCycleWeeks),
        departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), fridayCycleWeeks, fridayTemplateRotation, savedFileName,
      }));
    } catch {}
    setDirty(true);
  }, [staff, departments, normalizedCoverageBlocks, passBank, fridayCycleWeeks, fridayTemplateRotation, loaded]);

  // Hjälp: bygg datapaketet att skriva till fil
  const buildSaveData = () => ({
    version: 3,
    exportedAt: new Date().toISOString(),
    staff: normalizeStaffList(staff, fridayCycleWeeks),
    departments, coverageBlocks: normalizedCoverageBlocks, passBank: normalizePassBank(passBank), fridayCycleWeeks, fridayTemplateRotation,
  });

  // Skriv data till en redan öppnad fil-handle
  const writeToHandle = async (handle, data) => {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
  };

  // Spara: använder File System Access API om webbläsaren stöder det,
  // annars faller den tillbaka till vanlig nedladdning (Hämtade filer).
  const saveToFile = async (saveAs = false) => {
    const data = buildSaveData();
    const today = new Date().toISOString().slice(0, 10);
    const defaultName = `schemafix-${today}.json`;

    // Modern API (Chrome/Edge/Opera): visar en riktig "Spara som"-dialog
    if (window.showSaveFilePicker) {
      try {
        let handle = fileHandle;
        // Inget öppet handle eller "Spara som" begärt — visa dialog
        if (!handle || saveAs) {
          handle = await window.showSaveFilePicker({
            suggestedName: savedFileName || defaultName,
            types: [{
              description: 'Schemafil',
              accept: { 'application/json': ['.json'] },
            }],
          });
          setFileHandle(handle);
        }
        await writeToHandle(handle, data);
        setSavedFileName(handle.name);
        setDirty(false);
        return;
      } catch (err) {
        // Användaren avbröt dialogen — gör inget
        if (err.name === 'AbortError') return;
        // Annat fel — fall ner till fallback
        console.error('File picker fel:', err);
      }
    }

    // Fallback (Firefox/Safari): vanlig nedladdning till Hämtade filer
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = savedFileName || defaultName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSavedFileName(a.download);
    setDirty(false);
  };

  // Öppna fil: använder File System Access API om tillgängligt så att Spara
  // sedan kan skriva tillbaka till samma fil utan ny dialog.
  const openFile = async () => {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'Schemafil',
            accept: { 'application/json': ['.json'] },
          }],
        });
        const file = await handle.getFile();
        await loadFromFileObject(file);
        setFileHandle(handle);
      } catch (err) {
        if (err.name !== 'AbortError') console.error('File picker fel:', err);
      }
      return;
    }
    // Fallback: trigga den dolda <input type="file">
    document.getElementById('loadFileInput').click();
  };

  // Läs in en File-instans (gemensam för båda flöden)
  const loadFromFileObject = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.staff || !data.departments) {
          alert('Den här filen ser inte ut att vara ett sparat schema.');
          resolve(false); return;
        }
        if (staff.length > 0 && !confirm('Detta ersätter all nuvarande data. Fortsätt?')) {
          resolve(false); return;
        }
        const loadedDepartments = data.departments || [];
        const normalizedStaff = normalizeStaffList(data.staff || [], data.fridayCycleWeeks || 8);
        setStaff(normalizedStaff);
        setDepartments(loadedDepartments);
        setCoverageBlocks(normalizeCoverageBlocks(data.coverageBlocks || initialCoverageBlocks, loadedDepartments));
        setPassBank(normalizePassBank(data.passBank || initialPassBank));
        setFridayCycleWeeksRaw(data.fridayCycleWeeks || 8);
        setFridayTemplateRotation(resizeRotation(data.fridayTemplateRotation, data.fridayCycleWeeks || 8));
        if (normalizedStaff.length > 0) nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
        setSavedFileName(file.name);
        setTimeout(() => setDirty(false), 50);
        resolve(true);
      } catch (err) {
        alert('Kunde inte läsa filen: ' + err.message);
        resolve(false);
      }
    };
    reader.readAsText(file);
  });

  // Bakåtkompatibel wrapper för den dolda <input type="file"> i fallback-läge
  const loadFromFile = (file) => {
    setFileHandle(null); // Ingen handle vid fallback
    loadFromFileObject(file);
  };

  // Varna innan användaren stänger fliken om det finns osparade ändringar
  useEffect(() => {
    if (!dirty) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const applyExampleScenario = (scenario) => {
    if (!scenario) return;
    if (staff.length > 0 && !confirm(`Detta ersätter nuvarande data med testscenariot "${scenario.name}". Fortsätt?`)) return;
    const normalizedStaff = normalizeStaffList(scenario.staff, scenario.fridayCycleWeeks);
    setStaff(normalizedStaff);
    setDepartments(scenario.departments);
    setCoverageBlocks(normalizeCoverageBlocks(scenario.coverageBlocks, scenario.departments));
    setPassBank(normalizePassBank(scenario.passBank || initialPassBank));
    setFridayCycleWeeksRaw(scenario.fridayCycleWeeks);
    setFridayTemplateRotation(resizeRotation(scenario.fridayTemplateRotation, scenario.fridayCycleWeeks));
    setCurrentFridayWeek(1);
    setFileHandle(null);
    setSavedFileName(null);
    nextId = Math.max(...normalizedStaff.map(p => p.id), 99) + 1;
    setShowExamplePicker(false);
  };
  const loadExample = () => {
    setShowExamplePicker(true);
  };
  const clearAll = () => {
    if (!confirm('Detta tar bort all personal. Avdelningar behålls. Är du säker?')) return;
    setStaff([]);
  };

  const dayData = useMemo(() => {
    let present;
    if (activeDay === 'fri') {
      present = staff
        .filter(s => !(s.daysOff || []).includes('fri'))
        .map(s => {
          const sh = getFridayShift(s, currentFridayWeek, fridayCycleWeeks, fridayTemplateRotation);
          if (!sh) return null;
          return { ...s, _friShift: sh, startMin: timeToMin(sh[0]), endMin: timeToMin(sh[1]) };
        })
        .filter(Boolean)
        .sort((a, b) => a.startMin - b.startMin);
    } else {
      present = staff.filter(s => s.sched[activeDay] && !(s.daysOff || []).includes(activeDay))
        .map(s => ({ ...s, startMin: timeToMin(s.sched[activeDay][0]), endMin: timeToMin(s.sched[activeDay][1]) }))
        .sort((a, b) => a.startMin - b.startMin);
    }
    const coverageViews = coverageScopes.map(scope => {
      const scopePresent = scope.scopeType === COVERAGE_DEPARTMENT
        ? present.filter(p => p.deptId === scope.deptId)
        : present;
      const slots = scope.slots.map(slot => {
        const count = scopePresent.filter(p => p.startMin <= slot.start && p.endMin > slot.start).length;
        return { ...slot, count, gap: count < slot.min };
      });
      const gaps = slots.filter(s => s.gap);
      return {
        ...scope,
        present: scopePresent,
        slots,
        gaps,
        gapMinutes: gaps.reduce((sum, s) => sum + 15 * (s.min - s.count), 0),
      };
    });
    const primaryCoverage = coverageViews.find(v => v.key === COVERAGE_SHARED)
      || coverageViews.find(v => v.slots.some(s => s.min > 0))
      || coverageViews[0]
      || null;
    return {
      present,
      coverageViews,
      totalGaps: coverageViews.reduce((sum, v) => sum + v.gaps.length, 0),
      totalGapMinutes: coverageViews.reduce((sum, v) => sum + v.gapMinutes, 0),
      primaryCoverageKey: primaryCoverage?.key || COVERAGE_SHARED,
    };
  }, [staff, activeDay, coverageScopes, currentFridayWeek, fridayCycleWeeks]);

  const violations = useMemo(() => {
    const v = [];
    for (const s of staff) {
      const wm = weeklyMinutes(s, fridayCycleWeeks, fridayTemplateRotation);
      const dev = wm - getTargetMin(s);
      if (hasWeekdaySchedule(s) && Math.abs(dev) > 5) {
        v.push({ id: s.id, name: s.name, severity: Math.abs(dev) > 60 ? 'high' : 'med',
          msg: `${dev > 0 ? 'Över' : 'Under'} timmål med ${minToHM(Math.abs(dev))} (${minToHM(wm)} av ${minToHM(getTargetMin(s))})` });
      }
      if (s.onlyAfternoons) {
        for (const d of DAYS) {
          if (s.sched[d.key] && timeToMin(s.sched[d.key][0]) < 720)
            v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${s.sched[d.key][0]} men ska bara jobba eftermiddag` });
        }
      }
      // Tidsbegränsningar — kontrollera per dag och per paritet (jämn/udda)
      for (const d of DAYS) {
        const sh = s.sched[d.key];
        if (!sh) continue;
        const start = timeToMin(sh[0]);
        const end   = timeToMin(sh[1]);
        const dayHasOverride = !!(s.dayOverrides || {})[d.key];

        // Källa-spårning: vad är hårdast och varifrån kommer regeln?
        const sources = ['even', 'odd'];
        const reported = new Set();
        for (const par of sources) {
          const tag = dayHasOverride ? ' (dagsundantag)' : (s.parityOverrides?.[par] ? ` (${par === 'even' ? 'jämn' : 'udda'} vecka)` : '');
          const earliestStart = getConstraint(s, d.key, 'earliestStart', par);
          const latestStart   = getConstraint(s, d.key, 'latestStart',   par);
          const earliestEnd   = getConstraint(s, d.key, 'earliestEnd',   par);
          const latestEnd     = getConstraint(s, d.key, 'latestEnd',     par);
          if (earliestStart != null && start < earliestStart) {
            const k = `${d.key}-es-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men tidigaste tillåtna är ${minToTime(earliestStart)}${tag}` }); }
          }
          if (latestStart != null && start > latestStart) {
            const k = `${d.key}-ls-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men måste börja senast ${minToTime(latestStart)}${tag}` }); }
          }
          if (earliestEnd != null && end < earliestEnd) {
            const k = `${d.key}-ee-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men måste jobba minst till ${minToTime(earliestEnd)}${tag}` }); }
          }
          if (latestEnd != null && end > latestEnd) {
            const k = `${d.key}-le-${tag}`;
            if (!reported.has(k)) { reported.add(k);
              v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men senaste tillåtna är ${minToTime(latestEnd)}${tag}` }); }
          }
        }
      }
    }
    return v;
  }, [staff, fridayCycleWeeks, fridayTemplateRotation]);

  const updateStaff = (updated) => setStaff(prev => prev.map(s => s.id === updated.id ? normalizePerson(updated, fridayCycleWeeks) : s));
  const removeStaff = (id) => setStaff(prev => prev.filter(s => s.id !== id));
  const addStaff = () => {
    if (departments.length === 0) {
      alert('Lägg till minst en avdelning under "Inställningar" först.');
      setView('settings');
      return;
    }
    const newPerson = normalizePerson(P({
      id: nextId++, name: 'Ny anställd', deptId: departments[0].id, role: '',
      sched: {},
      allowedPassIds: [],
      fridayRotation: new Array(fridayCycleWeeks).fill(null),
    }), fridayCycleWeeks);
    setStaff([...staff, newPerson]);
    setEditingId(newPerson.id);
  };

  const handleGenerate = async () => {
    const preparedStaff = prepareStaffForUse(staff, fridayCycleWeeks, fridayTemplateRotation, passBank);
    setGenerating(true);
    setAlternatives(null);
    setGenerationProgress({ percent: 3, label: 'Förbereder...', detail: 'Samlar regler och bemanningskrav' });
    await yieldToBrowser();
    try {
      const alts = await generateAlternativesAsync(
        preparedStaff,
        coverageScopes,
        fridayCycleWeeks,
        fridayTemplateRotation,
        passBank,
        setGenerationProgress
      );
      setGenerationProgress({ percent: 100, label: 'Klart', detail: 'Schemaförslagen är färdiga' });
      setAlternatives(alts);
    } finally {
      setGenerating(false);
    }
  };

  const applyAlternative = (alt) => {
    setStaff(alt.staff);
    setAlternatives(null);
  };

  return (
    <div className="min-h-screen w-full" style={{ backgroundColor: '#FBF8F4', fontFamily: '"Geist", -apple-system, system-ui, sans-serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@400;500;600&display=swap');
        body { font-family: "Geist", system-ui, sans-serif; }
        .display-font { font-family: "Fraunces", Georgia, serif; font-feature-settings: "ss01"; }
      `}</style>

      <div className="max-w-7xl mx-auto px-6 py-8">
        <header className="mb-8 flex items-end justify-between flex-wrap gap-4">
          <div>
            <p className="text-xs uppercase tracking-widest text-stone-500 mb-1">Fritidshem · schemaverktyg</p>
            <h1 className="display-font text-4xl text-stone-800" style={{ letterSpacing: '-0.02em' }}>SchemaFIX</h1>
            <div className="flex items-center gap-2 mt-1">
              <p className="text-stone-600 text-sm">Prototyp v14 · passbank, passstyrd generator och förenklat personalflöde</p>
              {dirty && (
                <span className="inline-flex items-center gap-1 text-xs text-amber-700 bg-amber-50 ring-1 ring-amber-200 rounded-full px-2 py-0.5">
                  <Circle size={6} fill="currentColor" />
                  Osparade ändringar
                </span>
              )}
              {!dirty && savedFileName && (
                <span className="text-xs text-stone-500">Sparat som {savedFileName}</span>
              )}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex gap-1">
              <input type="file" accept="application/json,.json" id="loadFileInput" style={{ display: 'none' }}
                onChange={(e) => {
                  const file = e.target.files?.[0];
                  if (file) loadFromFile(file);
                  e.target.value = '';
                }} />
              <button onClick={openFile}
                className="px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center gap-1.5"
                title="Öppna en sparad schemafil">
                <Upload size={14} />Öppna
              </button>
              <button onClick={() => saveToFile(false)}
                className={`px-3 py-2 rounded-lg text-sm ring-1 transition flex items-center gap-1.5 ${dirty ? 'bg-amber-50 text-amber-900 ring-amber-300 hover:bg-amber-100' : 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50'}`}
                title={fileHandle ? `Sparar till ${savedFileName}` : 'Välj plats och spara'}>
                <Download size={14} />Spara
              </button>
              {fileHandle && (
                <button onClick={() => saveToFile(true)}
                  className="px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center gap-1.5"
                  title="Spara som ny fil">
                  Spara som...
                </button>
              )}
            </div>
            <button onClick={handleGenerate} disabled={generating || staff.length === 0}
              className="px-4 py-2.5 rounded-full text-sm bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2 disabled:opacity-50">
              <Wand2 size={14} />
              {generating ? 'Räknar...' : 'Generera schemaförslag'}
            </button>
            <button onClick={() => setShowWelcome(true)} title="Hjälp och guidad tur"
              className="p-2 rounded-full text-stone-500 hover:bg-stone-200/60 hover:text-stone-800 transition">
              <HelpCircle size={18} />
            </button>
            <div className="flex gap-1 p-1 rounded-full bg-stone-200/60 flex-wrap">
              {[
                { k: 'schedule', label: 'Vecka', icon: Calendar },
                { k: 'staff',    label: 'Personal', icon: Users },
                { k: 'rules',    label: 'Bemanning', icon: Clock },
                { k: 'settings', label: 'Inställningar', icon: Settings },
              ].map(t => {
                const Icon = t.icon;
                return (
                  <button key={t.k} onClick={() => setView(t.k)}
                    className={`px-4 py-2 rounded-full text-sm flex items-center gap-2 transition ${view === t.k ? 'bg-white shadow-sm text-stone-900' : 'text-stone-600 hover:text-stone-900'}`}>
                    <Icon size={14} />{t.label}
                  </button>
                );
              })}
            </div>
          </div>
        </header>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <StatCard label="Personal" value={staff.length} sub="aktiva" />
          <StatCard label="Veckotimmar tot." value={minToHM(staff.reduce((a, s) => a + weeklyMinutes(s, fridayCycleWeeks, fridayTemplateRotation), 0))} />
          <StatCard label="Täckningsgap" value={dayData.totalGaps} sub={`på ${activeDay === 'fri' ? 'fredag' : DAYS.find(d => d.key === activeDay).label.toLowerCase()}`}
            highlight={dayData.totalGaps > 0 ? 'warn' : 'ok'} />
          <StatCard label="Regelbrott" value={violations.length}
            highlight={violations.length > 0 ? 'warn' : 'ok'} sub={violations.length > 0 ? 'se Personal-fliken' : 'allt ok'} />
        </div>

        {view === 'schedule' && (
          <ScheduleView dayData={dayData} activeDay={activeDay} setActiveDay={setActiveDay} onEdit={setEditingId}
            staffCount={staff.length} onGoToStaff={() => setView('staff')} onLoadExample={loadExample}
            departments={departments}
            fridayCycleWeeks={fridayCycleWeeks} currentFridayWeek={currentFridayWeek}
            setCurrentFridayWeek={setCurrentFridayWeek}
            hasFridaySetup={staff.some(s => (s.hasFridayRotation && Array.isArray(s.fridayRotation) && s.fridayRotation.some(x => x)) || (!s.hasFridayRotation && s.fridayShift))} />
        )}
        {view === 'staff' && <StaffView staff={staff} fridayCycleWeeks={fridayCycleWeeks} fridayTemplateRotation={fridayTemplateRotation} violations={violations} onEdit={setEditingId} onAdd={addStaff}
          onLoadExample={loadExample} departments={departments} />}
        {view === 'rules' && <RulesView blocks={normalizedCoverageBlocks} setBlocks={setCoverageBlocks} departments={departments} />}
        {view === 'settings' && <SettingsView departments={departments} setDepartments={setDepartments}
          staff={staff} setStaff={setStaff} coverageBlocks={normalizedCoverageBlocks} setCoverageBlocks={setCoverageBlocks}
          passBank={passBank} setPassBank={setPassBank}
          fridayTemplateRotation={fridayTemplateRotation} setFridayTemplateRotation={setFridayTemplateRotation}
          fridayCycleWeeks={fridayCycleWeeks} setFridayCycleWeeks={setFridayCycleWeeks}
          onLoadExample={loadExample} onClearAll={clearAll} />}

        <footer className="mt-10 pt-6 border-t border-stone-200 text-xs text-stone-500 flex justify-between items-start gap-4 flex-wrap">
          <span>Klicka på en person för att redigera detaljer. Tryck "Generera schemaförslag" när du vill att appen pusslar fram alternativ baserat på allas villkor.</span>
          <span className="text-stone-400 whitespace-nowrap">© 2026 Andreas Jonsson, Lärare i fritidshem</span>
        </footer>
      </div>

      {editingId !== null && (
        <StaffEditModal staff={staff.find(s => s.id === editingId)}
          departments={departments}
          passBank={passBank}
          fridayCycleWeeks={fridayCycleWeeks}
          fridayTemplateRotation={fridayTemplateRotation}
          onSave={(updated) => { updateStaff(updated); setEditingId(null); }}
          onClose={() => setEditingId(null)}
          onRemove={(id) => { removeStaff(id); setEditingId(null); }} />
      )}

      {generating && (
        <div className="fixed inset-0 z-40 flex items-center justify-center" style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }}>
          <div className="bg-white rounded-2xl p-8 shadow-2xl text-center max-w-sm">
            <div className="display-font text-2xl text-stone-800 mb-2">Pusslar...</div>
            <p className="text-sm text-stone-600">{generationProgress.detail || 'Testar tusentals justeringar för att hitta tre olika alternativ åt er.'}</p>
            <div className="mt-4 h-2 bg-stone-200 rounded-full overflow-hidden" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow={generationProgress.percent}>
              <div className="h-full bg-stone-800 transition-all duration-200" style={{ width: `${generationProgress.percent}%` }} />
            </div>
            <div className="mt-3 flex items-center justify-between text-xs text-stone-500">
              <span>{generationProgress.label || 'Räknar...'}</span>
              <span>{generationProgress.percent}%</span>
            </div>
            <p className="text-[11px] text-stone-400 mt-2">Appen jobbar i små steg för att sidan ska fortsätta kännas levande.</p>
          </div>
        </div>
      )}

      {alternatives && (
        <AlternativesModal alternatives={alternatives} currentStaff={staff} coverageScopes={coverageScopes} fridayCycleWeeks={fridayCycleWeeks} fridayTemplateRotation={fridayTemplateRotation}
          departments={departments}
          onApply={applyAlternative} onClose={() => setAlternatives(null)} />
      )}

      {showExamplePicker && (
        <ExampleDataModal scenarios={EXAMPLE_SCENARIOS} onSelect={applyExampleScenario} onClose={() => setShowExamplePicker(false)} />
      )}

      {showWelcome && (
        <WelcomeModal onClose={dismissWelcome} onStartTour={startTour} />
      )}

      {tourStep !== null && (
        <TourBubble step={tourStep} onNext={nextTourStep} onClose={endTour} />
      )}
    </div>
  );
}

// ==================== SUBCOMPONENTS ====================

// Liten introduktionsruta som visas högst upp på varje flik. Förklarar vad fliken är till för.
function TabIntro({ children }) {
  return (
    <div className="bg-stone-100/70 ring-1 ring-stone-200 rounded-lg px-4 py-3 text-sm text-stone-600 leading-relaxed">
      {children}
    </div>
  );
}

// Tooltip — liten ?-ikon som visar förklarande text vid hover. Funkar både med mus och tapp.
function Tooltip({ text }) {
  const [open, setOpen] = useState(false);
  return (
    <span className="relative inline-flex items-center"
      onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}>
      <button type="button" onClick={(e) => { e.preventDefault(); setOpen(o => !o); }}
        className="text-stone-400 hover:text-stone-700 ml-1 flex items-center" tabIndex={-1}>
        <HelpCircle size={12} />
      </button>
      {open && (
        <span className="absolute left-1/2 bottom-full mb-1.5 z-30 w-56 -translate-x-1/2 px-3 py-2 rounded-lg bg-stone-800 text-white text-[11px] leading-relaxed shadow-lg pointer-events-none">
          {text}
          <span className="absolute top-full left-1/2 -translate-x-1/2 -mt-px"
            style={{ borderLeft: '4px solid transparent', borderRight: '4px solid transparent', borderTop: '4px solid #1c1917' }} />
        </span>
      )}
    </span>
  );
}

function StatCard({ label, value, sub, highlight }) {
  const ring = highlight === 'warn' ? 'ring-1 ring-orange-300 bg-orange-50/60'
             : highlight === 'ok'   ? 'ring-1 ring-emerald-200 bg-emerald-50/40'
             : 'ring-1 ring-stone-200 bg-white';
  return (
    <div className={`rounded-xl p-4 ${ring}`}>
      <p className="text-xs uppercase tracking-wider text-stone-500">{label}</p>
      <p className="display-font text-2xl mt-1 text-stone-800">{value}</p>
      {sub && <p className="text-xs text-stone-500 mt-0.5">{sub}</p>}
    </div>
  );
}

function ScheduleView({ dayData, activeDay, setActiveDay, onEdit, staffCount, onGoToStaff, onLoadExample, departments,
                        fridayCycleWeeks, currentFridayWeek, setCurrentFridayWeek, hasFridaySetup }) {
  const [coverageFocus, setCoverageFocus] = useState(dayData.primaryCoverageKey || COVERAGE_SHARED);
  const ticks = []; for (let m = 360; m <= TIMELINE_END; m += 60) ticks.push(m);
  const isFriday = activeDay === 'fri';
  const dayLabel = isFriday ? 'Fredag' : DAYS.find(d => d.key === activeDay).label;
  const visibleCoverageViews = dayData.coverageViews;

  useEffect(() => {
    const available = visibleCoverageViews.map(v => v.key);
    if (!available.includes(coverageFocus)) {
      setCoverageFocus(dayData.primaryCoverageKey || available[0] || COVERAGE_SHARED);
    }
  }, [coverageFocus, dayData.primaryCoverageKey, visibleCoverageViews]);

  const focusedCoverage = visibleCoverageViews.find(v => v.key === coverageFocus)
    || visibleCoverageViews[0]
    || dayData.coverageViews[0]
    || null;
  const visiblePresent = focusedCoverage?.present || dayData.present;
  const maxCount = Math.max(...((focusedCoverage?.slots || []).map(s => Math.max(s.count, s.min))), 5);

  if (staffCount === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <div className="display-font text-2xl text-stone-800 mb-2">Inget schema än</div>
        <p className="text-sm text-stone-500 mb-6 max-w-md mx-auto">
          Lägg till personalen som ska schemaläggas. Varje person får individuella villkor — arbetstid, undervisningstid, fasta dagar — som appen tar hänsyn till när den föreslår scheman.
        </p>
        <div className="flex gap-2 justify-center">
          <button onClick={onGoToStaff} className="px-5 py-2.5 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
            <Users size={14} />Gå till Personal
          </button>
          <button onClick={onLoadExample} className="px-5 py-2.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition text-sm">
            Välj exempeldata
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <TabIntro>
        Här ser du schemat per dag och hur bemanningen ser ut över tiden. Växla mellan gemensam bemanning och avdelningar för att se om varje del av fritids har rätt täckning.
      </TabIntro>
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div className="flex gap-2 flex-wrap">
          {DAYS.map(d => (
            <button key={d.key} onClick={() => setActiveDay(d.key)}
              className={`px-4 py-2 rounded-lg text-sm transition ${activeDay === d.key ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
              {d.label}
            </button>
          ))}
          <button key="fri" onClick={() => setActiveDay('fri')}
            className={`px-4 py-2 rounded-lg text-sm transition ${isFriday ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
            Fredag
          </button>
        </div>
        {isFriday && hasFridaySetup && (
          <div className="flex items-center gap-2 bg-white ring-1 ring-stone-200 rounded-lg px-2 py-1">
            <button onClick={() => setCurrentFridayWeek(w => ((w - 2 + fridayCycleWeeks) % fridayCycleWeeks) + 1)}
              className="p-1 hover:bg-stone-100 rounded text-stone-600">‹</button>
            <span className="text-sm tabular-nums text-stone-700 px-2">
              Vecka <span className="display-font" style={{ fontWeight: 500 }}>{currentFridayWeek}</span> av {fridayCycleWeeks}
            </span>
            <button onClick={() => setCurrentFridayWeek(w => (w % fridayCycleWeeks) + 1)}
              className="p-1 hover:bg-stone-100 rounded text-stone-600">›</button>
          </div>
        )}
      </div>

      {isFriday && !hasFridaySetup && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-lg p-4 flex items-start gap-3">
          <AlertCircle size={16} className="text-amber-700 mt-0.5 flex-shrink-0" />
          <div className="text-sm text-stone-700">
            <p style={{ fontWeight: 500 }}>Ingen fredagsrutin ifylld än</p>
            <p className="text-xs text-stone-600 mt-1">Klicka på en person i Personal-fliken och fyll i deras fredagstider.</p>
          </div>
        </div>
      )}

      {visibleCoverageViews.length > 0 && (
        <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-3">
          {visibleCoverageViews.map(view => {
            const selected = focusedCoverage?.key === view.key;
            return (
              <button key={view.key} onClick={() => setCoverageFocus(view.key)}
                className={`text-left rounded-xl p-4 transition ring-1 ${selected ? 'bg-stone-800 text-white ring-stone-800 shadow-lg' : 'bg-white text-stone-800 ring-stone-200 hover:bg-stone-50'}`}>
                <div className="flex items-center justify-between gap-3">
                  <span className="text-sm" style={{ fontWeight: 500 }}>{view.label}</span>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: view.color }} />
                </div>
                <p className={`text-xs mt-2 ${selected ? 'text-stone-300' : 'text-stone-500'}`}>
                  {view.slots.some(s => s.min > 0)
                    ? `${view.gaps.length} gap · ${view.gapMinutes} min underskott`
                    : 'Inga krav satta än'}
                </p>
              </button>
            );
          })}
        </div>
      )}

      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">{dayLabel}{isFriday && hasFridaySetup ? ` · vecka ${currentFridayWeek}` : ''}</h2>
            {focusedCoverage && (
              <p className="text-xs text-stone-500 mt-1">
                Visar bemanning för <span style={{ fontWeight: 500 }}>{focusedCoverage.label.toLowerCase()}</span>
              </p>
            )}
          </div>
          <div className="flex gap-3 text-xs flex-wrap">
            {departments.map(d => (
              <span key={d.id} className="flex items-center gap-1.5">
                <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: d.color }} />
                <span className="text-stone-600">{d.name}</span>
              </span>
            ))}
          </div>
        </div>

        <div className="relative h-6 mb-2 ml-32 border-b border-stone-200">
          {ticks.map(m => (
            <div key={m} className="absolute top-0 text-[10px] text-stone-400" style={{ left: `${pctFromMin(m)}%`, transform: 'translateX(-50%)' }}>
              {minToTime(m)}<div className="w-px h-1.5 bg-stone-300 mx-auto mt-0.5" />
            </div>
          ))}
        </div>

        <div className="space-y-1.5">
          {visiblePresent.length === 0 && (
            <p className="text-sm text-stone-400 italic py-4 text-center">
              {focusedCoverage?.scopeType === COVERAGE_DEPARTMENT ? 'Ingen personal från denna avdelning arbetar just nu' : `Ingen personal arbetar denna ${isFriday ? 'fredag' : 'dag'}`}
            </p>
          )}
          {visiblePresent.map(p => {
            const dept = getDept(p.deptId, departments);
            const soft = softColor(dept.color);
            const shiftLabel = isFriday
              ? `${p._friShift[0]}–${p._friShift[1]}`
              : `${p.sched[activeDay][0]}–${p.sched[activeDay][1]}`;
            return (
              <div key={p.id} className="flex items-center group">
                <div className="w-32 pr-3 text-right">
                  <button onClick={() => onEdit(p.id)} className="text-sm text-stone-800 hover:text-stone-900 truncate flex items-center gap-1 ml-auto">
                    <Edit3 size={10} className="opacity-0 group-hover:opacity-50 transition" />{p.name}
                  </button>
                  {p.role && <p className="text-[10px] text-stone-500 truncate">{p.role}</p>}
                </div>
                <div className="flex-1 relative h-7 bg-stone-50 rounded-md cursor-pointer" onClick={() => onEdit(p.id)}>
                  <div className="absolute h-full rounded-md flex items-center px-2 transition-all hover:opacity-90"
                    style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                      backgroundColor: soft, borderLeft: `3px solid ${dept.color}` }}>
                    <span className="text-[11px] truncate text-stone-700" style={{ fontWeight: 500 }}>
                      {shiftLabel}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {focusedCoverage && (
          <div className="mt-6 pt-4 border-t border-stone-100">
            <div className="flex items-center justify-between mb-2">
              <p className="text-xs uppercase tracking-wider text-stone-500">Antal personal per 15 min</p>
              {focusedCoverage.gaps.length > 0 ? (
                <span className="text-xs text-orange-600 flex items-center gap-1">
                  <AlertCircle size={12} />{focusedCoverage.gaps.length} gap mot bemanningskrav
                </span>
              ) : (
                <span className="text-xs text-emerald-600 flex items-center gap-1">
                  <CheckCircle2 size={12} />Täcker alla krav
                </span>
              )}
            </div>
            <div className="ml-32 relative h-16 bg-stone-50 rounded-md overflow-hidden">
              {focusedCoverage.slots.map(s => {
                const w = 100 / focusedCoverage.slots.length;
                const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
                const h = (s.count / maxCount) * 100;
                return <div key={s.start} className="absolute bottom-0" style={{ left: `${left}%`, width: `${w}%`, height: `${h}%`,
                  backgroundColor: s.gap ? '#F59E0B' : focusedCoverage.color, opacity: s.gap ? 0.85 : 0.55 }} />;
              })}
              {focusedCoverage.slots.map(s => {
                const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
                const w = 100 / focusedCoverage.slots.length;
                const h = (s.min / maxCount) * 100;
                return <div key={`m${s.start}`} className="absolute" style={{ left: `${left}%`, width: `${w}%`,
                  bottom: `${h}%`, height: '1px', backgroundColor: '#dc2626', opacity: 0.6 }} />;
              })}
            </div>
            <div className="ml-32 mt-1 flex items-center gap-4 text-[10px] text-stone-500">
              <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: focusedCoverage.color, opacity: 0.55 }} />Faktisk</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: '#F59E0B', opacity: 0.85 }} />Under min</span>
              <span className="flex items-center gap-1"><span className="w-3 h-px" style={{ backgroundColor: '#dc2626' }} />Krav</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StaffView({ staff, fridayCycleWeeks, fridayTemplateRotation, violations, onEdit, onAdd, onLoadExample, departments }) {
  if (staff.length === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <Users size={32} className="mx-auto text-stone-300 mb-3" />
        <div className="display-font text-2xl text-stone-800 mb-2">Lägg till första personen</div>
        <p className="text-sm text-stone-500 mb-6 max-w-md mx-auto">
          Börja med en person i taget. Du anger främst avdelning, tjänstgöringsgrad, vilka pass personen får ta, fredagsrutin och villkor som styr när personen kan arbeta.
        </p>
        <div className="flex gap-2 justify-center flex-wrap">
          <button onClick={onAdd} className="px-5 py-2.5 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
            <Plus size={14} />Lägg till personal
          </button>
          <button onClick={onLoadExample} className="px-5 py-2.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition text-sm">
            Välj exempeldata
          </button>
        </div>
        <p className="text-xs text-stone-400 mt-6 max-w-sm mx-auto">
          Exempeldatan använder påhittade namn och olika typer av passbanker, så du kan testa generatorn utan att blanda in riktig personal.
        </p>
      </div>
    );
  }
  return (
    <div className="space-y-4">
      <TabIntro>
        Lägg till och redigera personalen. Börja med reglerna och passurvalet, och använd manuell veckoredigering först när du vill finjustera enskilda dagar. Listan visar varje persons mål jämfört med faktisk arbetstid.
      </TabIntro>
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-stone-50 border-b border-stone-200">
            <tr className="text-left text-xs uppercase tracking-wider text-stone-500">
              <th className="px-4 py-3">Namn</th><th className="px-4 py-3">Avdelning</th>
              <th className="px-4 py-3">Roll</th>
              <th className="px-4 py-3 text-right">Tjänst</th>
              <th className="px-4 py-3 text-right">Mål</th>
              <th className="px-4 py-3 text-right">Faktisk</th>
              <th className="px-4 py-3 text-right">Diff</th>
              <th className="px-4 py-3">Villkor</th>
              <th className="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody>
            {staff.map(s => {
              const wm = weeklyMinutes(s, fridayCycleWeeks, fridayTemplateRotation);
              const targetMin = getTargetMin(s);
              const diff = wm - targetMin;
              const hasGeneratedWeek = hasWeekdaySchedule(s);
              const off = hasGeneratedWeek && Math.abs(diff) > 5;
              const dept = getDept(s.deptId, departments);
              const tags = [];
              if (s.fixedTimes) tags.push('Fast tid');
              if (s.onlyAfternoons) tags.push('Endast em.');
              if (s.earliestStart != null) tags.push(`Tidigast ${minToTime(s.earliestStart)}`);
              if (s.latestStart  != null) tags.push(`Senast börja ${minToTime(s.latestStart)}`);
              if (s.earliestEnd  != null) tags.push(`Minst till ${minToTime(s.earliestEnd)}`);
              if (s.latestEnd    != null) tags.push(`Senast ${minToTime(s.latestEnd)}`);
              if ((s.allowedPassIds || []).length === 0) tags.push('Alla pass');
              if ((s.allowedPassIds || []).length > 0) tags.push(`${s.allowedPassIds.length} valda pass`);
              const overrideDays = Object.keys(s.dayOverrides || {}).filter(k => s.dayOverrides[k] && Object.values(s.dayOverrides[k]).some(v => v != null));
              if (overrideDays.length > 0) tags.push(`Dagsundantag: ${overrideDays.map(k => getDayMeta(k).short).join(', ')}`);
              const parityKeys = Object.keys(s.parityOverrides || {}).filter(k => s.parityOverrides[k] && Object.values(s.parityOverrides[k]).some(v => v != null));
              if (parityKeys.length > 0) tags.push(`Varannan: ${parityKeys.map(k => k === 'even' ? 'jämn' : 'udda').join(', ')}`);
              if ((s.daysOff || []).length > 0) tags.push(`Ledig ${s.daysOff.map(d => getDayMeta(d).short).join(', ')}`);
              if (s.hasFridayRotation && s.fridayUseTemplate) tags.push(`Fredagsmall: start v${s.fridayTemplateStartWeek || 1}`);
              if (!s.hasFridayRotation && s.fridayShift) tags.push('Fast fredag');
              return (
                <tr key={s.id} className="border-b border-stone-100 last:border-0 hover:bg-stone-50/50">
                  <td className="px-4 py-3"><p className="text-stone-800" style={{ fontWeight: 500 }}>{s.name}</p></td>
                  <td className="px-4 py-3">
                    <span className="inline-flex items-center gap-1.5 text-xs">
                      <span className="w-2 h-2 rounded-sm" style={{ backgroundColor: dept.color }} />
                      {dept.name}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-stone-600">{s.role || '—'}</td>
                  <td className="px-4 py-3 text-right text-stone-700 tabular-nums text-xs">
                    {(s.percent ?? 100)}% av {(s.fullTimeHours ?? 37.5)}h
                  </td>
                  <td className="px-4 py-3 text-right text-stone-700 tabular-nums">{minToHM(targetMin)}</td>
                  <td className={`px-4 py-3 text-right tabular-nums ${off ? (diff > 0 ? 'text-orange-600' : 'text-amber-700') : 'text-stone-700'}`}>
                    {hasGeneratedWeek ? minToHM(wm) : '—'}
                  </td>
                  <td className={`px-4 py-3 text-right tabular-nums text-xs ${off ? (diff > 0 ? 'text-orange-600' : 'text-amber-700') : 'text-stone-400'}`}>
                    {hasGeneratedWeek ? (off ? `${diff > 0 ? '+' : ''}${minToHM(Math.abs(diff))}` : '✓') : 'Ej genererat'}
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex flex-wrap gap-1">
                      {tags.length === 0 && <span className="text-xs text-stone-400">—</span>}
                      {tags.map((c, i) => (<span key={i} className="text-[10px] px-1.5 py-0.5 rounded bg-stone-100 text-stone-700">{c}</span>))}
                    </div>
                  </td>
                  <td className="px-4 py-3">
                    <button onClick={() => onEdit(s.id)} className="text-xs text-stone-500 hover:text-stone-900 flex items-center gap-1">
                      <Edit3 size={12} />Redigera
                    </button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div className="px-4 py-3 bg-stone-50/50 border-t border-stone-200 flex justify-between items-center flex-wrap gap-2">
          <span className="text-xs text-stone-500">{staff.length} personer totalt</span>
          <button onClick={onAdd} className="text-sm flex items-center gap-1.5 text-stone-700 hover:text-stone-900">
            <Plus size={14} />Lägg till personal
          </button>
        </div>
      </div>

      {violations.length > 0 && (
        <div className="bg-orange-50 ring-1 ring-orange-200 rounded-xl p-4">
          <div className="flex items-center gap-2 mb-3">
            <AlertCircle size={14} className="text-orange-600" />
            <p className="text-xs uppercase tracking-wider text-orange-700">Att kolla på ({violations.length})</p>
          </div>
          <ul className="space-y-1.5">
            {violations.map((v, i) => (
              <li key={i} className="text-sm text-stone-700 flex items-start gap-2">
                <ChevronRight size={14} className={`mt-0.5 flex-shrink-0 ${v.severity === 'high' ? 'text-orange-600' : 'text-amber-500'}`} />
                <span><span style={{ fontWeight: 500 }}>{v.name}:</span> {v.msg}</span>
              </li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}

function RulesView({ blocks, setBlocks, departments }) {
  const updateBlock = (id, patch) => setBlocks(blocks.map(b => b.id === id ? { ...b, ...patch } : b));
  const removeBlock = (id) => setBlocks(blocks.filter(b => b.id !== id));
  const addBlock = (scopeType = COVERAGE_SHARED) => {
    const newId = Math.max(0, ...blocks.map(b => b.id)) + 1;
    const lastEnd = blocks.length > 0 ? Math.max(...blocks.map(b => b.end)) : 480;
    setBlocks([...blocks, {
      id: newId,
      start: lastEnd,
      end: lastEnd + 60,
      min: 1,
      label: 'Nytt block',
      scopeType,
      deptId: scopeType === COVERAGE_DEPARTMENT ? (departments[0]?.id || '') : null,
    }]);
  };

  const sorted = [...blocks].sort((a, b) => a.start - b.start);
  const scopeViews = buildCoverageScopes(blocks, departments);
  const scopeOptions = [
    { value: COVERAGE_SHARED, label: 'Gemensam bemanning' },
    ...departments.map(d => ({ value: `dept:${d.id}`, label: d.name })),
  ];

  return (
    <div className="space-y-4">
      <TabIntro>
        Här definierar du hur många personer som behöver vara på plats vid olika tider. Block kan gälla hela fritids tillsammans eller en viss avdelning, vilket gör att ni kan ha sammanslagen morgon men olika eftermiddagsstarter.
      </TabIntro>
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4 gap-4 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">Bemanningskrav</h2>
            <p className="text-sm text-stone-500 mt-0.5">Definiera gemensamma block och avdelningsblock. Olika avdelningar kan starta olika tider.</p>
          </div>
          <div className="flex gap-2 flex-wrap">
            <button onClick={() => addBlock(COVERAGE_SHARED)}
              className="text-sm text-stone-700 hover:text-stone-900 flex items-center gap-1.5 px-3 py-2 rounded-lg bg-stone-100 hover:bg-stone-200">
              <Plus size={14} />Gemensamt block
            </button>
            <button onClick={() => addBlock(COVERAGE_DEPARTMENT)} disabled={departments.length === 0}
              className="text-sm text-stone-700 hover:text-stone-900 flex items-center gap-1.5 px-3 py-2 rounded-lg bg-stone-100 hover:bg-stone-200 disabled:opacity-50">
              <Plus size={14} />Avdelningsblock
            </button>
          </div>
        </div>

        <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-3 mb-5">
          {scopeViews.map(view => {
            const maxMin = Math.max(...view.slots.map(s => s.min), 1);
            return (
              <div key={view.key} className="rounded-xl ring-1 ring-stone-200 bg-stone-50/70 p-3">
                <div className="flex items-center justify-between gap-3 mb-2">
                  <span className="text-sm text-stone-800" style={{ fontWeight: 500 }}>{view.label}</span>
                  <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: view.color }} />
                </div>
                <div className="relative h-12 bg-white rounded-md overflow-hidden ring-1 ring-stone-100">
                  {view.slots.map(s => {
                    const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
                    const w = 100 / view.slots.length;
                    const h = (s.min / maxMin) * 100;
                    return <div key={s.start} className="absolute bottom-0"
                      style={{ left: `${left}%`, width: `${w}%`, height: `${h}%`, backgroundColor: view.color, opacity: 0.55 }} />;
                  })}
                </div>
                <p className="text-[10px] text-stone-500 mt-2">
                  {view.slots.some(s => s.min > 0) ? 'Minimikrav över dagen' : 'Inga block satta än'}
                </p>
              </div>
            );
          })}
        </div>

        <div className="space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-stone-500 px-2 pb-1">
            <div className="col-span-3">Namn på block</div>
            <div className="col-span-3">Gäller för</div>
            <div className="col-span-3">Tid</div>
            <div className="col-span-2">Minsta personal</div>
            <div className="col-span-1"></div>
          </div>
          {sorted.map(b => (
            <div key={b.id} className="grid grid-cols-12 gap-2 items-center py-2 px-2 rounded-lg hover:bg-stone-50">
              <input className="rules-input col-span-3" value={b.label}
                onChange={e => updateBlock(b.id, { label: e.target.value })} placeholder="ex. Morgonfritids" />
              <select className="rules-input col-span-3"
                value={b.scopeType === COVERAGE_DEPARTMENT ? `dept:${b.deptId}` : COVERAGE_SHARED}
                onChange={e => {
                  const next = e.target.value;
                  if (next === COVERAGE_SHARED) updateBlock(b.id, { scopeType: COVERAGE_SHARED, deptId: null });
                  else updateBlock(b.id, { scopeType: COVERAGE_DEPARTMENT, deptId: next.replace('dept:', '') });
                }}>
                {scopeOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
              </select>
              <div className="col-span-3 flex items-center gap-1">
                <input type="time" className="rules-input flex-1"
                  value={minToTime(b.start)} onChange={e => updateBlock(b.id, { start: timeToMin(e.target.value) })} />
                <span className="text-stone-400 text-xs">–</span>
                <input type="time" className="rules-input flex-1"
                  value={minToTime(b.end)} onChange={e => updateBlock(b.id, { end: timeToMin(e.target.value) })} />
              </div>
              <div className="col-span-2 flex items-center gap-2">
                <button type="button" onClick={() => updateBlock(b.id, { min: Math.max(0, b.min - 1) })}
                  className="w-7 h-7 rounded bg-stone-100 hover:bg-stone-200 text-stone-700">−</button>
                <span className="display-font text-lg text-stone-800 w-8 text-center tabular-nums">{b.min}</span>
                <button type="button" onClick={() => updateBlock(b.id, { min: b.min + 1 })}
                  className="w-7 h-7 rounded bg-stone-100 hover:bg-stone-200 text-stone-700">+</button>
              </div>
              <div className="col-span-1 flex justify-end">
                <button onClick={() => removeBlock(b.id)} className="text-stone-400 hover:text-red-600 p-1">
                  <Trash2 size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>

        <div className="mt-5 pt-4 border-t border-stone-100 text-xs text-stone-500">
          <p>Tips: skapa ett gemensamt block för t.ex. 06:00–08:00 och lägg sedan avdelningsblock med olika starttider, t.ex. 13:15 för F–2 och 14:15 för åk 3–5. Om block överlappar inom samma vy används det första i tidsordning.</p>
        </div>
      </div>

      <style>{`
        .rules-input { background: white; border: 1px solid #e7e5e4; border-radius: 6px; padding: 5px 8px; font-size: 13px; color: #1c1917; outline: none; }
        .rules-input:focus { border-color: #78716c; box-shadow: 0 0 0 2px rgba(120, 113, 108, 0.1); }
      `}</style>
    </div>
  );
}

// -------- Settings View (departments etc.) --------

function SettingsView({ departments, setDepartments, staff, setStaff, coverageBlocks, setCoverageBlocks,
                        passBank, setPassBank, fridayTemplateRotation, setFridayTemplateRotation, fridayCycleWeeks, setFridayCycleWeeks, onLoadExample, onClearAll }) {
  const updateDept = (id, patch) => setDepartments(departments.map(d => d.id === id ? { ...d, ...patch } : d));
  const removeDept = (id) => {
    const usedBy = staff.filter(s => s.deptId === id);
    if (usedBy.length > 0) {
      if (!confirm(`${usedBy.length} person(er) tillhör denna avdelning: ${usedBy.map(s => s.name).join(', ')}. De kommer behöva bytas till en annan avdelning manuellt. Fortsätt?`)) return;
    }
    const coverageForDept = coverageBlocks.filter(b => b.scopeType === COVERAGE_DEPARTMENT && b.deptId === id).length;
    if (coverageForDept > 0) {
      setCoverageBlocks(coverageBlocks.filter(b => !(b.scopeType === COVERAGE_DEPARTMENT && b.deptId === id)));
    }
    setDepartments(departments.filter(d => d.id !== id));
  };
  const addDept = () => {
    const newId = 'd' + (Math.max(0, ...departments.map(d => parseInt(d.id.replace('d','')) || 0)) + 1);
    const usedColors = departments.map(d => d.color);
    const nextColor = DEPT_COLORS.find(c => !usedColors.includes(c)) || DEPT_COLORS[departments.length % DEPT_COLORS.length];
    setDepartments([...departments, { id: newId, name: 'Ny avdelning', color: nextColor }]);
  };
  const updatePass = (id, patch) => setPassBank(normalizePassBank(passBank.map(pass => pass.id === id ? { ...pass, ...patch } : pass)));
  const removePass = (id) => {
    if (passBank.length <= 1) {
      alert('Passbanken behöver minst ett pass.');
      return;
    }
    setPassBank(normalizePassBank(passBank.filter(pass => pass.id !== id)));
    setStaff(prev => prev.map(person => ({
      ...person,
      allowedPassIds: (person.allowedPassIds || []).filter(passId => passId !== id),
    })));
  };
  const addPass = () => {
    const sorted = normalizePassBank(passBank);
    const base = sorted[sorted.length - 1] || initialPassBank[0];
    const start = clamp((base?.start || 480) + 30, 330, 1020);
    const end = clamp((base?.end || 960) + 30, start + 60, 1080);
    setPassBank([...sorted, normalizePass({
      id: `pass-${Math.random().toString(36).slice(2, 8)}`,
      name: `Nytt pass ${sorted.length + 1}`,
      start,
      end,
      days: WEEKDAY_KEYS,
      deptId: '',
    })]);
  };

  const counts = Object.fromEntries(departments.map(d => [d.id, staff.filter(s => s.deptId === d.id).length]));
  const orphaned = staff.filter(s => !departments.find(d => d.id === s.deptId));
  const rotators = staff.filter(s => s.hasFridayRotation);
  const updateTemplateWeek = (weekIdx, idx, val) => {
    const next = resizeRotation(fridayTemplateRotation, fridayCycleWeeks);
    const cur = next[weekIdx] || ['',''];
    next[weekIdx] = idx === 0 ? [val, cur[1]] : [cur[0], val];
    if (!next[weekIdx][0] && !next[weekIdx][1]) next[weekIdx] = null;
    setFridayTemplateRotation(next);
  };
  const setTemplateWeekOff = (weekIdx, off) => {
    const next = resizeRotation(fridayTemplateRotation, fridayCycleWeeks);
    next[weekIdx] = off ? null : ['07:00','15:30'];
    setFridayTemplateRotation(next);
  };

  return (
    <div className="space-y-4">
      <TabIntro>
        Övergripande inställningar för fritidshemmet. Här ändrar du avdelningar, passbanken som generatorn får använda, fredagsrullens cykellängd och hanterar din data.
      </TabIntro>
      {/* Avdelningar */}
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4">
          <div>
            <h2 className="display-font text-xl text-stone-800">Avdelningar</h2>
            <p className="text-sm text-stone-500 mt-0.5">Lägg till, döp om, ändra färg eller ta bort avdelningar.</p>
          </div>
        </div>

        <div className="space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-stone-500 px-2 pb-1">
            <div className="col-span-1">Färg</div>
            <div className="col-span-6">Namn</div>
            <div className="col-span-3">Personal</div>
            <div className="col-span-2"></div>
          </div>
          {departments.map(d => (
            <div key={d.id} className="grid grid-cols-12 gap-2 items-center py-2 px-2 rounded-lg hover:bg-stone-50">
              <div className="col-span-1 flex items-center">
                <input type="color" className="w-8 h-8 rounded cursor-pointer border-0 p-0"
                  value={d.color} onChange={e => updateDept(d.id, { color: e.target.value })} />
              </div>
              <div className="col-span-6">
                <input className="rules-input w-full" value={d.name}
                  onChange={e => updateDept(d.id, { name: e.target.value })} placeholder="Avdelningsnamn" />
              </div>
              <div className="col-span-3 text-sm text-stone-600">
                {counts[d.id] || 0} {counts[d.id] === 1 ? 'person' : 'personer'}
              </div>
              <div className="col-span-2 flex justify-end">
                <button onClick={() => removeDept(d.id)} className="text-stone-400 hover:text-red-600 p-1">
                  <Trash2 size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>

        <button onClick={addDept}
          className="mt-3 text-sm text-stone-700 hover:text-stone-900 flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-stone-100">
          <Plus size={14} />Lägg till avdelning
        </button>

        {orphaned.length > 0 && (
          <div className="mt-5 pt-4 border-t border-orange-200 bg-orange-50/50 -mx-5 -mb-5 px-5 py-4 rounded-b-2xl">
            <div className="flex items-start gap-2">
              <AlertCircle size={14} className="text-orange-600 mt-0.5 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{orphaned.length} person(er) saknar avdelning</p>
                <p className="text-xs text-stone-600 mt-1">{orphaned.map(o => o.name).join(', ')} — gå till Personal-fliken och tilldela dem en avdelning.</p>
              </div>
            </div>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-start justify-between mb-4 gap-4 flex-wrap">
          <div>
            <h2 className="display-font text-xl text-stone-800">Passbank</h2>
            <p className="text-sm text-stone-500 mt-0.5 max-w-2xl">
              Här lägger du in de riktiga pass som generatorn får använda på vardagar. Personalen kan sedan få alla pass eller bara ett urval av dem.
            </p>
          </div>
          <button onClick={addPass}
            className="px-4 py-2 rounded-lg text-sm bg-stone-100 text-stone-700 hover:bg-stone-200 transition flex items-center gap-1.5">
            <Plus size={14} />Lägg till pass
          </button>
        </div>

        <div className="space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[10px] uppercase tracking-wider text-stone-500 px-2 pb-1">
            <div className="col-span-3">Namn</div>
            <div className="col-span-2">Start</div>
            <div className="col-span-2">Slut</div>
            <div className="col-span-3">Dagar</div>
            <div className="col-span-1">Avd.</div>
            <div className="col-span-1"></div>
          </div>
          {normalizePassBank(passBank).map(pass => (
            <div key={pass.id} className="grid grid-cols-12 gap-2 items-center py-2 px-2 rounded-lg hover:bg-stone-50">
              <div className="col-span-3">
                <input className="rules-input w-full" value={pass.name}
                  onChange={e => updatePass(pass.id, { name: e.target.value })} placeholder="Passnamn" />
              </div>
              <div className="col-span-2">
                <input type="time" className="rules-input w-full" value={minToTime(pass.start)}
                  onChange={e => updatePass(pass.id, { start: timeToMin(e.target.value) || pass.start })} />
              </div>
              <div className="col-span-2">
                <input type="time" className="rules-input w-full" value={minToTime(pass.end)}
                  onChange={e => updatePass(pass.id, { end: timeToMin(e.target.value) || pass.end })} />
              </div>
              <div className="col-span-3 flex flex-wrap gap-1">
                {DAYS.map(day => {
                  const active = pass.days.includes(day.key);
                  return (
                    <button key={day.key} type="button" onClick={() => updatePass(pass.id, {
                      days: active ? pass.days.filter(key => key !== day.key) : [...pass.days, day.key],
                    })}
                      className={`px-2 py-1 rounded text-[10px] transition ${active ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
                      {day.short}
                    </button>
                  );
                })}
              </div>
              <div className="col-span-1">
                <select className="rules-input w-full" value={pass.deptId || ''}
                  onChange={e => updatePass(pass.id, { deptId: e.target.value })}>
                  <option value="">Alla</option>
                  {departments.map(dept => <option key={dept.id} value={dept.id}>{dept.name}</option>)}
                </select>
              </div>
              <div className="col-span-1 flex justify-end">
                <button onClick={() => removePass(pass.id)} className="text-stone-400 hover:text-red-600 p-1">
                  <Trash2 size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>

        <div className="mt-4 rounded-xl bg-stone-50 ring-1 ring-stone-200 p-4">
          <p className="text-xs uppercase tracking-wider text-stone-500 mb-2">Så används passbanken</p>
          <div className="space-y-1 text-sm text-stone-600">
            <p>Generatorn väljer i första hand bland dessa pass i stället för att hitta på fria tider.</p>
            <p>Pass kan göras avdelningsspecifika eller gälla alla avdelningar.</p>
            <p>Fredag styrs fortfarande separat av fast fredag eller fredagsrull längre ner i personalens formulär.</p>
          </div>
        </div>
      </div>

      {/* Fredagsrullen */}

                      <th key={w} className="text-center px-2 py-1 min-w-[72px]">v{w + 1}</th>

      {/* Data — exempel och rensning */}

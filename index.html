<script>
// Bygg lucide-react-stilade komponenter ovanpå lucide UMD.
// lucide UMD exponerar varje ikon som en array av barn-element: [[tag, attrs], [tag, attrs], ...]
// Vi bygger en React-komponent som tar size/className/fill/style etc precis som lucide-react.
(function() {
  const { createElement: h } = React;
  const iconNames = ['AlertCircle', 'Clock', 'Users', 'Calendar', 'CheckCircle2', 'ChevronRight', 'Edit3', 'Sparkles', 'X', 'Plus', 'Trash2', 'Wand2', 'Settings', 'Download', 'Upload', 'Circle'];
  const defaultSvgAttrs = {
    xmlns: 'http://www.w3.org/2000/svg',
    viewBox: '0 0 24 24',
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 2,
    strokeLinecap: 'round',
    strokeLinejoin: 'round',
  };
  const icons = {};
  iconNames.forEach(name => {
    icons[name] = function IconComponent(props = {}) {
      const { size = 24, fill, color, className, style, ...rest } = props;
      const iconChildren = window.lucide && window.lucide[name];
      if (!iconChildren || !Array.isArray(iconChildren)) {
        return h('span', { className, style });
      }
      const children = iconChildren.map((child, i) => {
        const [tag, childAttrs] = child;
        // Konvertera kebab-case attrs (stroke-width) → camelCase för React
        const reactAttrs = {};
        Object.entries(childAttrs || {}).forEach(([k, v]) => {
          const reactKey = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
          reactAttrs[reactKey] = v;
        });
        return h(tag, { key: i, ...reactAttrs });
      });
      return h('svg', {
        ...defaultSvgAttrs,
        width: size, height: size,
        fill: fill || defaultSvgAttrs.fill,
        stroke: color || defaultSvgAttrs.stroke,
        className, style,
        ...rest,
      }, ...children);
    };
  });
  window.__icons = icons;
})();
</script>

// Hjälp: räkna ut "soft" pastellvariant från huvudfärg
function softColor(hex) {
  if (!hex || hex.length < 7) return '#f5f5f4';
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const blend = c => Math.round(c * 0.18 + 255 * 0.82);
  const toHex = c => c.toString(16).padStart(2, '0');
  return `#${toHex(blend(r))}${toHex(blend(g))}${toHex(blend(b))}`;
}

// Slå upp en avdelning från id (eller fallback om den raderats)
function getDept(deptId, departments) {
  return departments.find(d => d.id === deptId) || { id: '?', name: '(saknas)', color: '#999999' };
}

// Returnerar den effektiva tidsbegränsningen för en person på en specifik dag.
// Om det finns ett dagspecifikt undantag används det, annars den generella regeln.
function getConstraint(person, dayKey, key) {
  const ov = (person.dayOverrides || {})[dayKey];
  if (ov && ov[key] !== undefined) return ov[key];
  return person[key];
}

// Räkna ut målet i minuter från fullTimeHours + percent
function getTargetMin(person) {
  return Math.round(((person.fullTimeHours ?? 37.5) * 60 * (person.percent ?? 100)) / 100);
}

// Räkna ut en persons fredagspass för en given vecka i cykeln (1-indexerad).
// Modell: varje person har sin EGNA lista av fredagspass (en per vecka i cykeln).
// Det är samma struktur som i den ursprungliga Excel-filen — varje person har sin rad.
function getFridayShift(person, week, cycleWeeks) {
  if (!person.hasFridayRotation && person.fridayShift) return person.fridayShift;
  if (person.hasFridayRotation && Array.isArray(person.fridayRotation) && person.fridayRotation.length > 0) {
    const len = person.fridayRotation.length;
    const idx = (((week - 1) % len) + len) % len;
    return person.fridayRotation[idx] || null;
  }
  return null;
}

// Snittlig fredagstid över cykeln (för veckotim-räkning)
function avgFridayMinutes(person, cycleWeeks) {
  if (!person.hasFridayRotation && person.fridayShift) return dayMinutes(person.fridayShift);
  if (!person.hasFridayRotation || !Array.isArray(person.fridayRotation) || person.fridayRotation.length === 0) return 0;
  let sum = 0;
  for (let w = 1; w <= cycleWeeks; w++) {
    const sh = getFridayShift(person, w, cycleWeeks);
    if (sh) sum += dayMinutes(sh);
  }
  return sum / cycleWeeks;
}

// Justera längden på en persons rotation-array (fyll med null eller trunkera)
function resizeRotation(rotation, length) {
  const cur = Array.isArray(rotation) ? rotation : [];
  const out = new Array(length).fill(null);
  for (let i = 0; i < Math.min(cur.length, length); i++) out[i] = cur[i];
  return out;
}

const DAYS = [
  { key: 'mon', label: 'Måndag', short: 'mån' },
  { key: 'tue', label: 'Tisdag', short: 'tis' },
  { key: 'wed', label: 'Onsdag', short: 'ons' },
  { key: 'thu', label: 'Torsdag', short: 'tor' },
];

// Standardvärden för alla parametrar — gör koden nedan mer läsbar

  fixedTimes: false, onlyAfternoons: false,
  earliestStart: null, latestStart: null,
  earliestEnd: null, latestEnd: null,
  // Dagspecifika undantag som åsidosätter de generella ovan på just den dagen.

// Hjälpfunktion: bygger en personalpost med default-värden + det man skickar in

// Tom start. EXAMPLE_STAFF + EXAMPLE_DEPARTMENTS kan laddas in via knapp.

const EXAMPLE_DEPARTMENTS = [

// Exempel-bas: 8 turer som rullas igenom. Varje person får en kopia förskjuten med olika offset

}

const EXAMPLE_STAFF = [

  P({ id: 9, name: 'Jonas W', deptId: 'd3', percent: 82, role: 'åk 5',
      sched: { mon:['08:00','16:30'], tue:['05:50','15:00'], wed:['10:05','16:30'], thu:['07:15','16:00'] },

  P({ id:10, name: 'Lars', deptId: 'd3', percent: 45.6, role: 'åk 2',
      sched: { mon:['13:00','16:30'], tue:['13:00','16:15'], wed:['12:45','16:00'], thu:['13:00','16:30'] },
      onlyAfternoons: true, hasFridayRotation: false }),
  P({ id:11, name: 'Susanne', deptId: 'd3', percent: 82, role: 'fklass',

  P({ id:12, name: 'Hampus', deptId: 'd3', percent: 82, role: '',

      fixedTimes: true, hasFridayRotation: false, fridayShift: ['07:45','15:45'] }),
];

// Bemanningskrav som redigerbara block. Varje block: starttid–sluttid → minst N personer.
// Tider är i minuter från midnatt (t.ex. 360 = 06:00).
const initialCoverageBlocks = [
  { id: 1, start: 350, end: 480, min: 2, label: 'Morgonfritids' },     // 05:50–08:00
  { id: 2, start: 480, end: 780, min: 1, label: 'Skoldag' },            // 08:00–13:00
  { id: 3, start: 780, end: 990, min: 4, label: 'Eftermiddagsfritids' },// 13:00–16:30
  { id: 4, start: 990, end: 1065, min: 2, label: 'Sen eftermiddag' },   // 16:30–17:45
];

// Konvertera block till 15-min slots som resten av koden använder
function blocksToSlots(blocks) {
  const arr = [];
  for (let m = 330; m < 1080; m += 15) {
    let min = 0;
    for (const b of blocks) {
      if (m >= b.start && m < b.end) { min = b.min; break; }
    }
    arr.push({ start: m, min });
  }
  return arr;
}

// ==================== HELPERS ====================

function timeToMin(t) { if (!t) return null; const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function minToTime(m) { const h = Math.floor(m / 60); const mm = m % 60; return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`; }
function minToHM(min) { const h = Math.floor(Math.abs(min) / 60); const m = Math.abs(min) % 60; const sign = min < 0 ? '-' : ''; return `${sign}${h} h ${m} min`; }
function dayMinutes(sched) { return timeToMin(sched[1]) - timeToMin(sched[0]); }
function weeklyMinutes(staff, cycleWeeks = 8) {
  let total = 0;
  for (const d of DAYS) if (staff.sched?.[d.key]) total += dayMinutes(staff.sched[d.key]);
  total += avgFridayMinutes(staff, cycleWeeks);
  return Math.round(total);
}

// ==================== SCHEDULE GENERATOR (Simulated Annealing) ====================

function computeSlots(staff, dayKey, coverage) {
  return coverage.map(slot => {
    let count = 0;
    for (const p of staff) {
      const sh = p.sched[dayKey];
      if (!sh) continue;
      const start = timeToMin(sh[0]);
      const end = timeToMin(sh[1]);
      if (start <= slot.start && end > slot.start) count++;
    }
    return { ...slot, count };
  });
}

function scheduleScore(staff, coverage, cycleWeeks, weights = { gap: 30, hours: 2, over: 1 }) {
  let score = 0;
  // Hour target
  for (const p of staff) {
    const wm = weeklyMinutes(p, cycleWeeks);
    score -= Math.abs(wm - getTargetMin(p)) * weights.hours;
  }
  // Coverage (mån-tor)
  for (const d of DAYS) {
    const slots = computeSlots(staff, d.key, coverage);
    for (const s of slots) {
      if (s.count < s.min) score -= (s.min - s.count) ** 2 * weights.gap;
      if (s.count > s.min + 2) score -= (s.count - s.min - 2) * weights.over;
    }
  }
  return score;
}

function isShiftLegal(person, dayKey, newShift) {
  const start = timeToMin(newShift[0]);
  const end = timeToMin(newShift[1]);
  if (start === null || end === null) return false;
  if (end - start < 60) return false;
  if (start < 330 || end > 1080) return false;
  if (person.onlyAfternoons && start < 720) return false;
  // Respektera dagspecifika undantag där de finns
  const earliestStart = getConstraint(person, dayKey, 'earliestStart');
  const latestStart   = getConstraint(person, dayKey, 'latestStart');
  const earliestEnd   = getConstraint(person, dayKey, 'earliestEnd');
  const latestEnd     = getConstraint(person, dayKey, 'latestEnd');
  if (earliestStart != null && start < earliestStart) return false;
  if (latestStart   != null && start > latestStart)   return false;
  if (earliestEnd   != null && end   < earliestEnd)   return false;
  if (latestEnd     != null && end   > latestEnd)     return false;
  if ((person.daysOff || []).includes(dayKey)) return false;
  return true;
}

function attemptMutation(staff) {
  const mutables = staff.filter(p => !p.fixedTimes);
  if (mutables.length === 0) return null;
  const p = mutables[Math.floor(Math.random() * mutables.length)];
  const validDays = DAYS.filter(d => p.sched[d.key] && !(p.daysOff || []).includes(d.key));
  if (validDays.length === 0) return null;
  const d = validDays[Math.floor(Math.random() * validDays.length)];
  const sh = p.sched[d.key];

  const which = Math.random() < 0.5 ? 0 : 1;
  const stepUnits = 1 + Math.floor(Math.random() * 4);
  const delta = (Math.random() < 0.5 ? -15 : 15) * stepUnits;
  const newShift = [...sh];
  newShift[which] = minToTime(timeToMin(sh[which]) + delta);

  if (!isShiftLegal(p, d.key, newShift)) return null;

  return staff.map(person => person.id === p.id
    ? { ...person, sched: { ...person.sched, [d.key]: newShift } }
    : person
  );
}

function runSearch(initialStaff, coverage, cycleWeeks, weights, iterations = 2500) {
  let current = initialStaff.map(p => ({ ...p, sched: { ...p.sched } }));
  let currentScore = scheduleScore(current, coverage, cycleWeeks, weights);
  let best = current;
  let bestScore = currentScore;
  let temp = 80;
  const coolRate = 0.9985;

  for (let i = 0; i < iterations; i++) {
    const cand = attemptMutation(current);
    if (!cand) continue;
    const cs = scheduleScore(cand, coverage, cycleWeeks, weights);
    const delta = cs - currentScore;
    if (delta >= 0 || Math.random() < Math.exp(delta / temp)) {
      current = cand;
      currentScore = cs;
      if (cs > bestScore) { best = cand; bestScore = cs; }
    }
    temp *= coolRate;
  }
  return best;
}

function summarizeSchedule(staff, coverage, cycleWeeks) {
  let totalGaps = 0, totalGapMinutes = 0;
  for (const d of DAYS) {
    const slots = computeSlots(staff, d.key, coverage);
    for (const s of slots) if (s.count < s.min) { totalGaps++; totalGapMinutes += 15 * (s.min - s.count); }
  }
  let totalHourDev = 0, peopleOff = 0;
  for (const p of staff) {
    const dev = weeklyMinutes(p, cycleWeeks) - getTargetMin(p);
    totalHourDev += Math.abs(dev);
    if (Math.abs(dev) > 5) peopleOff++;
  }
  return { totalGaps, totalGapMinutes, totalHourDev, peopleOff };
}

function generateAlternatives(initialStaff, coverage, cycleWeeks) {
  const variants = [
    { label: 'Bemannings­fokus', desc: 'Prioriterar att alla pass är täckta', weights: { gap: 50, hours: 1, over: 1 } },
    { label: 'Tim­fokus',        desc: 'Prioriterar exakta veckotimmar',     weights: { gap: 15, hours: 5, over: 1 } },
    { label: 'Balanserat',       desc: 'Väger båda målen lika',                weights: { gap: 30, hours: 2, over: 1 } },
  ];
  return variants.map(v => {
    const result = runSearch(initialStaff, coverage, cycleWeeks, v.weights, 2500);
    return { ...v, staff: result, summary: summarizeSchedule(result, coverage, cycleWeeks) };
  });
}

// ==================== UI ====================

const TIMELINE_START = 330;
const TIMELINE_END   = 1080;
const TIMELINE_RANGE = TIMELINE_END - TIMELINE_START;
const pctFromMin = m => ((m - TIMELINE_START) / TIMELINE_RANGE) * 100;

let nextId = 100;

function FritidsSchemaApp() {
  const [staff, setStaff] = useState(initialStaff);
  const [departments, setDepartments] = useState(initialDepartments);
  const [coverageBlocks, setCoverageBlocks] = useState(initialCoverageBlocks);
  const [fridayCycleWeeks, setFridayCycleWeeksRaw] = useState(8);
  const [currentFridayWeek, setCurrentFridayWeek] = useState(1);
  const coverage = useMemo(() => blocksToSlots(coverageBlocks), [coverageBlocks]);
  const [activeDay, setActiveDay] = useState('mon');
  const [view, setView] = useState('schedule');
  const [editingId, setEditingId] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [alternatives, setAlternatives] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [dirty, setDirty] = useState(false);
  const [savedFileName, setSavedFileName] = useState(null);
  // Referens till en öppnad fil (File System Access API). Kan inte sparas i localStorage,
  // så den nollställs vid ny session — men då fortsätter Spara att fungera (faller tillbaka till nedladdning).
  const [fileHandle, setFileHandle] = useState(null);

  // När cykellängden ändras: justera alla personers fridayRotation till rätt längd,
  // och håll currentFridayWeek inom giltigt intervall.
  const setFridayCycleWeeks = (n) => {
    const clamped = Math.max(1, Math.min(20, n || 1));
    setFridayCycleWeeksRaw(clamped);
    setStaff(prev => prev.map(s => ({
      ...s,
      fridayRotation: s.hasFridayRotation
        ? resizeRotation(s.fridayRotation, clamped)
        : s.fridayRotation,
    })));
    setCurrentFridayWeek(w => Math.min(Math.max(1, w), clamped));
  };

  // ----- Persistens -----
  // Autospar i localStorage som backup. Den primära "sanningen" är dock filen
  // som användaren själv exporterar/importerar — så data följer med mellan datorer/kollegor.
  const STORAGE_KEY = 'fritids-schema-v1';

  // Ladda backup vid start
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.staff) {
          setStaff(data.staff);
          if (data.staff.length > 0) nextId = Math.max(...data.staff.map(p => p.id), 99) + 1;
        }
        if (data.departments) setDepartments(data.departments);
        if (data.coverageBlocks) setCoverageBlocks(data.coverageBlocks);
        if (data.fridayCycleWeeks) setFridayCycleWeeksRaw(data.fridayCycleWeeks);
        if (data.savedFileName) setSavedFileName(data.savedFileName);
      }
    } catch {}
    setLoaded(true);
  }, []);

  // Autospar till localStorage vid varje ändring + markera som "ändrat sedan senaste filsparning"
  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        staff, departments, coverageBlocks, fridayCycleWeeks, savedFileName,
      }));
    } catch {}
    setDirty(true);
  }, [staff, departments, coverageBlocks, fridayCycleWeeks, loaded]);

  // Hjälp: bygg datapaketet att skriva till fil
  const buildSaveData = () => ({
    version: 1,
    exportedAt: new Date().toISOString(),
    staff, departments, coverageBlocks, fridayCycleWeeks,
  });

  // Skriv data till en redan öppnad fil-handle
  const writeToHandle = async (handle, data) => {
    const writable = await handle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
  };

  // Spara: använder File System Access API om webbläsaren stöder det,
  // annars faller den tillbaka till vanlig nedladdning (Hämtade filer).
  const saveToFile = async (saveAs = false) => {
    const data = buildSaveData();
    const today = new Date().toISOString().slice(0, 10);
    const defaultName = `schemafix-${today}.json`;

    // Modern API (Chrome/Edge/Opera): visar en riktig "Spara som"-dialog
    if (window.showSaveFilePicker) {
      try {
        let handle = fileHandle;
        // Inget öppet handle eller "Spara som" begärt — visa dialog
        if (!handle || saveAs) {
          handle = await window.showSaveFilePicker({
            suggestedName: savedFileName || defaultName,
            types: [{
              description: 'Schemafil',
              accept: { 'application/json': ['.json'] },
            }],
          });
          setFileHandle(handle);
        }
        await writeToHandle(handle, data);
        setSavedFileName(handle.name);
        setDirty(false);
        return;
      } catch (err) {
        // Användaren avbröt dialogen — gör inget
        if (err.name === 'AbortError') return;
        // Annat fel — fall ner till fallback
        console.error('File picker fel:', err);
      }
    }

    // Fallback (Firefox/Safari): vanlig nedladdning till Hämtade filer
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = savedFileName || defaultName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSavedFileName(a.download);
    setDirty(false);
  };

  // Öppna fil: använder File System Access API om tillgängligt så att Spara
  // sedan kan skriva tillbaka till samma fil utan ny dialog.
  const openFile = async () => {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{
            description: 'Schemafil',
            accept: { 'application/json': ['.json'] },
          }],
        });
        const file = await handle.getFile();
        await loadFromFileObject(file);
        setFileHandle(handle);
      } catch (err) {
        if (err.name !== 'AbortError') console.error('File picker fel:', err);
      }
      return;
    }
    // Fallback: trigga den dolda <input type="file">
    document.getElementById('loadFileInput').click();
  };

  // Läs in en File-instans (gemensam för båda flöden)
  const loadFromFileObject = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.staff || !data.departments) {
          alert('Den här filen ser inte ut att vara ett sparat schema.');
          resolve(false); return;
        }
        if (staff.length > 0 && !confirm('Detta ersätter all nuvarande data. Fortsätt?')) {
          resolve(false); return;
        }
        setStaff(data.staff || []);
        setDepartments(data.departments || []);
        setCoverageBlocks(data.coverageBlocks || initialCoverageBlocks);
        setFridayCycleWeeksRaw(data.fridayCycleWeeks || 8);
        if (data.staff && data.staff.length > 0) nextId = Math.max(...data.staff.map(p => p.id), 99) + 1;
        setSavedFileName(file.name);
        setTimeout(() => setDirty(false), 50);
        resolve(true);
      } catch (err) {
        alert('Kunde inte läsa filen: ' + err.message);
        resolve(false);
      }
    };
    reader.readAsText(file);
  });

  // Bakåtkompatibel wrapper för den dolda <input type="file"> i fallback-läge
  const loadFromFile = (file) => {
    setFileHandle(null); // Ingen handle vid fallback
    loadFromFileObject(file);
  };

  // Varna innan användaren stänger fliken om det finns osparade ändringar
  useEffect(() => {
    if (!dirty) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  const loadExample = () => {
    if (staff.length > 0 && !confirm('Detta ersätter den personal och avdelningar som finns nu. Fortsätt?')) return;
    setStaff(EXAMPLE_STAFF);
    setDepartments(EXAMPLE_DEPARTMENTS);
    setFridayCycleWeeksRaw(8);
    nextId = Math.max(...EXAMPLE_STAFF.map(p => p.id)) + 1;
  };
  const clearAll = () => {
    if (!confirm('Detta tar bort all personal. Avdelningar behålls. Är du säker?')) return;
    setStaff([]);
  };

  const dayData = useMemo(() => {
    let present;
    if (activeDay === 'fri') {
      present = staff
        .filter(s => !(s.daysOff || []).includes('fri'))
        .map(s => {
          const sh = getFridayShift(s, currentFridayWeek, fridayCycleWeeks);
          if (!sh) return null;
          return { ...s, _friShift: sh, startMin: timeToMin(sh[0]), endMin: timeToMin(sh[1]) };
        })
        .filter(Boolean)
        .sort((a, b) => a.startMin - b.startMin);
    } else {
      present = staff.filter(s => s.sched[activeDay] && !(s.daysOff || []).includes(activeDay))
        .map(s => ({ ...s, startMin: timeToMin(s.sched[activeDay][0]), endMin: timeToMin(s.sched[activeDay][1]) }))
        .sort((a, b) => a.startMin - b.startMin);
    }
    const slots = coverage.map(slot => {
      const count = present.filter(p => p.startMin <= slot.start && p.endMin > slot.start).length;
      return { ...slot, count, gap: count < slot.min };
    });
    return { present, slots, gaps: slots.filter(s => s.gap) };
  }, [staff, activeDay, coverage, currentFridayWeek, fridayCycleWeeks]);

  const violations = useMemo(() => {
    const v = [];
    for (const s of staff) {
      const wm = weeklyMinutes(s, fridayCycleWeeks);
      const dev = wm - getTargetMin(s);
      if (Math.abs(dev) > 5) {
        v.push({ id: s.id, name: s.name, severity: Math.abs(dev) > 60 ? 'high' : 'med',
          msg: `${dev > 0 ? 'Över' : 'Under'} timmål med ${minToHM(Math.abs(dev))} (${minToHM(wm)} av ${minToHM(getTargetMin(s))})` });
      }
      if (s.onlyAfternoons) {
        for (const d of DAYS) {
          if (s.sched[d.key] && timeToMin(s.sched[d.key][0]) < 720)
            v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${s.sched[d.key][0]} men ska bara jobba eftermiddag` });
        }
      }
      // Tidsbegränsningar — kontrollera per dag, respektera dagspecifika undantag
      for (const d of DAYS) {
        const sh = s.sched[d.key];
        if (!sh) continue;
        const start = timeToMin(sh[0]);
        const end   = timeToMin(sh[1]);
        const earliestStart = getConstraint(s, d.key, 'earliestStart');
        const latestStart   = getConstraint(s, d.key, 'latestStart');
        const earliestEnd   = getConstraint(s, d.key, 'earliestEnd');
        const latestEnd     = getConstraint(s, d.key, 'latestEnd');
        const ovTag = (s.dayOverrides || {})[d.key] ? ' (dagsundantag)' : '';
        if (earliestStart != null && start < earliestStart)
          v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men tidigaste tillåtna är ${minToTime(earliestStart)}${ovTag}` });
        if (latestStart != null && start > latestStart)
          v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: börjar ${sh[0]} men måste börja senast ${minToTime(latestStart)}${ovTag}` });
        if (earliestEnd != null && end < earliestEnd)
          v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men måste jobba minst till ${minToTime(earliestEnd)}${ovTag}` });
        if (latestEnd != null && end > latestEnd)
          v.push({ id: s.id, name: s.name, severity: 'high', msg: `${d.label}: slutar ${sh[1]} men senaste tillåtna är ${minToTime(latestEnd)}${ovTag}` });
      }
    }
    return v;
  }, [staff, fridayCycleWeeks]);

  const updateStaff = (updated) => setStaff(prev => prev.map(s => s.id === updated.id ? updated : s));
  const removeStaff = (id) => setStaff(prev => prev.filter(s => s.id !== id));
  const addStaff = () => {
    if (departments.length === 0) {
      alert('Lägg till minst en avdelning under "Inställningar" först.');
      setView('settings');
      return;
    }
    const newPerson = P({
      id: nextId++, name: 'Ny anställd', deptId: departments[0].id, role: '',
      sched: { mon:['08:00','15:45'], tue:['08:00','15:45'], wed:['08:00','15:45'], thu:['08:00','15:45'] },
      fridayRotation: new Array(fridayCycleWeeks).fill(null),
    });
    setStaff([...staff, newPerson]);
    setEditingId(newPerson.id);
  };

  const handleGenerate = async () => {
    setGenerating(true);
    setAlternatives(null);
    await new Promise(r => setTimeout(r, 50));
    const alts = generateAlternatives(staff, coverage, fridayCycleWeeks);
    setAlternatives(alts);
    setGenerating(false);
  };

  const applyAlternative = (alt) => {
    setStaff(alt.staff);
    setAlternatives(null);
  };

  return (
    <div className="min-h-screen w-full" style={{ backgroundColor: '#FBF8F4', fontFamily: '"Geist", -apple-system, system-ui, sans-serif' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@400;500;600&display=swap');
        body { font-family: "Geist", system-ui, sans-serif; }
        .display-font { font-family: "Fraunces", Georgia, serif; font-feature-settings: "ss01"; }
      `}</style>

      <div className="max-w-7xl mx-auto px-6 py-8">
        <header className="mb-8 flex items-end justify-between flex-wrap gap-4">
          <div>
            <p className="text-xs uppercase tracking-widest text-stone-500 mb-1">Fritidshem · schemaverktyg</p>
            <h1 className="display-font text-4xl text-stone-800" style={{ letterSpacing: '-0.02em' }}>SchemaFIX</h1>
            <div className="flex items-center gap-2 mt-1">
              <p className="text-stone-600 text-sm">Prototyp v10 · dagsspecifika undantag per person</p>
              {dirty && (
                <span className="inline-flex items-center gap-1 text-xs text-amber-700 bg-amber-50 ring-1 ring-amber-200 rounded-full px-2 py-0.5">
                  <Circle size={6} fill="currentColor" />
                  Osparade ändringar
                </span>
              )}
              {!dirty && savedFileName && (
                <span className="text-xs text-stone-500">Sparat som {savedFileName}</span>
              )}
            </div>
          </div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex gap-1">
              <input type="file" accept="application/json,.json" id="loadFileInput" style={{ display: 'none' }}
                onChange={(e) => {
                  const file = e.target.files?.[0];
                  if (file) loadFromFile(file);
                  e.target.value = '';
                }} />
              <button onClick={openFile}
                className="px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center gap-1.5"
                title="Öppna en sparad schemafil">
                <Upload size={14} />Öppna
              </button>
              <button onClick={() => saveToFile(false)}
                className={`px-3 py-2 rounded-lg text-sm ring-1 transition flex items-center gap-1.5 ${dirty ? 'bg-amber-50 text-amber-900 ring-amber-300 hover:bg-amber-100' : 'bg-white text-stone-700 ring-stone-200 hover:bg-stone-50'}`}
                title={fileHandle ? `Sparar till ${savedFileName}` : 'Välj plats och spara'}>
                <Download size={14} />Spara
              </button>
              {fileHandle && (
                <button onClick={() => saveToFile(true)}
                  className="px-3 py-2 rounded-lg text-sm bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50 transition flex items-center gap-1.5"
                  title="Spara som ny fil">
                  Spara som...
                </button>
              )}
            </div>
            <button onClick={handleGenerate} disabled={generating || staff.length === 0}
              className="px-4 py-2.5 rounded-full text-sm bg-stone-800 text-white hover:bg-stone-900 transition flex items-center gap-2 disabled:opacity-50">
              <Wand2 size={14} />
              {generating ? 'Räknar...' : 'Generera schemaförslag'}
            </button>
            <div className="flex gap-1 p-1 rounded-full bg-stone-200/60 flex-wrap">
              {[
                { k: 'schedule', label: 'Vecka', icon: Calendar },
                { k: 'staff',    label: 'Personal', icon: Users },
                { k: 'rules',    label: 'Bemanning', icon: Clock },
                { k: 'settings', label: 'Inställningar', icon: Settings },
              ].map(t => {
                const Icon = t.icon;
                return (
                  <button key={t.k} onClick={() => setView(t.k)}
                    className={`px-4 py-2 rounded-full text-sm flex items-center gap-2 transition ${view === t.k ? 'bg-white shadow-sm text-stone-900' : 'text-stone-600 hover:text-stone-900'}`}>
                    <Icon size={14} />{t.label}
                  </button>
                );
              })}
            </div>
          </div>
        </header>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
          <StatCard label="Personal" value={staff.length} sub="aktiva" />
          <StatCard label="Veckotimmar tot." value={minToHM(staff.reduce((a, s) => a + weeklyMinutes(s), 0))} />
          <StatCard label="Täckningsgap" value={dayData.gaps.length} sub={`på ${activeDay === 'fri' ? 'fredag' : DAYS.find(d => d.key === activeDay).label.toLowerCase()}`}
            highlight={dayData.gaps.length > 0 ? 'warn' : 'ok'} />
          <StatCard label="Regelbrott" value={violations.length}
            highlight={violations.length > 0 ? 'warn' : 'ok'} sub={violations.length > 0 ? 'se Personal-fliken' : 'allt ok'} />
        </div>

        {view === 'schedule' && (
          <ScheduleView dayData={dayData} activeDay={activeDay} setActiveDay={setActiveDay} onEdit={setEditingId}
            staffCount={staff.length} onGoToStaff={() => setView('staff')} onLoadExample={loadExample}
            departments={departments}
            fridayCycleWeeks={fridayCycleWeeks} currentFridayWeek={currentFridayWeek}
            setCurrentFridayWeek={setCurrentFridayWeek}
            hasFridaySetup={staff.some(s => (s.hasFridayRotation && Array.isArray(s.fridayRotation) && s.fridayRotation.some(x => x)) || (!s.hasFridayRotation && s.fridayShift))} />
        )}
        {view === 'staff' && <StaffView staff={staff} violations={violations} onEdit={setEditingId} onAdd={addStaff}
          onLoadExample={loadExample} onClearAll={clearAll} departments={departments} />}
        {view === 'rules' && <RulesView blocks={coverageBlocks} setBlocks={setCoverageBlocks} />}
        {view === 'settings' && <SettingsView departments={departments} setDepartments={setDepartments}
          staff={staff} setStaff={setStaff}
          fridayCycleWeeks={fridayCycleWeeks} setFridayCycleWeeks={setFridayCycleWeeks} />}

        <footer className="mt-10 pt-6 border-t border-stone-200 text-xs text-stone-500 flex justify-between items-start gap-4 flex-wrap">
          <span>Klicka på en person för att redigera detaljer. Tryck "Generera schemaförslag" när du vill att appen pusslar fram alternativ baserat på allas villkor.</span>
          <span className="text-stone-400 whitespace-nowrap">© 2026 Andreas Jonsson, Lärare i fritidshem</span>
        </footer>
      </div>

      {editingId !== null && (
        <StaffEditModal staff={staff.find(s => s.id === editingId)}
          departments={departments}
          fridayCycleWeeks={fridayCycleWeeks}
          onSave={(updated) => { updateStaff(updated); setEditingId(null); }}
          onClose={() => setEditingId(null)}
          onRemove={(id) => { removeStaff(id); setEditingId(null); }} />
      )}

      {generating && (
        <div className="fixed inset-0 z-40 flex items-center justify-center" style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }}>
          <div className="bg-white rounded-2xl p-8 shadow-2xl text-center max-w-sm">
            <div className="display-font text-2xl text-stone-800 mb-2">Pusslar...</div>
            <p className="text-sm text-stone-600">Testar tusentals justeringar för att hitta tre olika alternativ åt er.</p>
            <div className="mt-4 h-1 bg-stone-200 rounded-full overflow-hidden">
              <div className="h-full bg-stone-800 animate-pulse" style={{ width: '40%' }} />
            </div>
          </div>
        </div>
      )}

      {alternatives && (
        <AlternativesModal alternatives={alternatives} currentStaff={staff} coverage={coverage}
          departments={departments}
          onApply={applyAlternative} onClose={() => setAlternatives(null)} />
      )}
    </div>
  );
}

// ==================== SUBCOMPONENTS ====================

function StatCard({ label, value, sub, highlight }) {
  const ring = highlight === 'warn' ? 'ring-1 ring-orange-300 bg-orange-50/60'
             : highlight === 'ok'   ? 'ring-1 ring-emerald-200 bg-emerald-50/40'
             : 'ring-1 ring-stone-200 bg-white';
  return (
    <div className={`rounded-xl p-4 ${ring}`}>
      <p className="text-xs uppercase tracking-wider text-stone-500">{label}</p>
      <p className="display-font text-2xl mt-1 text-stone-800">{value}</p>
      {sub && <p className="text-xs text-stone-500 mt-0.5">{sub}</p>}
    </div>
  );
}

function ScheduleView({ dayData, activeDay, setActiveDay, onEdit, staffCount, onGoToStaff, onLoadExample, departments,
                        fridayCycleWeeks, currentFridayWeek, setCurrentFridayWeek, hasFridaySetup }) {
  const ticks = []; for (let m = 360; m <= TIMELINE_END; m += 60) ticks.push(m);
  const maxCount = Math.max(...dayData.slots.map(s => s.count), 5);
  const isFriday = activeDay === 'fri';
  const dayLabel = isFriday ? 'Fredag' : DAYS.find(d => d.key === activeDay).label;

  if (staffCount === 0) {
    return (
      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-12 text-center">
        <div className="display-font text-2xl text-stone-800 mb-2">Inget schema än</div>
        <p className="text-sm text-stone-500 mb-6 max-w-md mx-auto">
          Lägg till personalen som ska schemaläggas. Varje person får individuella villkor — arbetstid, undervisningstid, fasta dagar — som appen tar hänsyn till när den föreslår scheman.
        </p>
        <div className="flex gap-2 justify-center">
          <button onClick={onGoToStaff} className="px-5 py-2.5 rounded-lg bg-stone-800 text-white hover:bg-stone-900 transition text-sm flex items-center gap-2">
            <Users size={14} />Gå till Personal
          </button>
          <button onClick={onLoadExample} className="px-5 py-2.5 rounded-lg bg-stone-100 text-stone-700 hover:bg-stone-200 transition text-sm">
            Ladda exempeldata
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div className="flex gap-2 flex-wrap">
          {DAYS.map(d => (
            <button key={d.key} onClick={() => setActiveDay(d.key)}
              className={`px-4 py-2 rounded-lg text-sm transition ${activeDay === d.key ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
              {d.label}
            </button>
          ))}
          <button key="fri" onClick={() => setActiveDay('fri')}
            className={`px-4 py-2 rounded-lg text-sm transition ${isFriday ? 'bg-stone-800 text-white' : 'bg-white text-stone-700 ring-1 ring-stone-200 hover:bg-stone-50'}`}>
            Fredag
          </button>
        </div>
        {isFriday && hasFridaySetup && (
          <div className="flex items-center gap-2 bg-white ring-1 ring-stone-200 rounded-lg px-2 py-1">
            <button onClick={() => setCurrentFridayWeek(w => ((w - 2 + fridayCycleWeeks) % fridayCycleWeeks) + 1)}
              className="p-1 hover:bg-stone-100 rounded text-stone-600">‹</button>
            <span className="text-sm tabular-nums text-stone-700 px-2">
              Vecka <span className="display-font" style={{ fontWeight: 500 }}>{currentFridayWeek}</span> av {fridayCycleWeeks}
            </span>
            <button onClick={() => setCurrentFridayWeek(w => (w % fridayCycleWeeks) + 1)}
              className="p-1 hover:bg-stone-100 rounded text-stone-600">›</button>
          </div>
        )}
      </div>

      {isFriday && !hasFridaySetup && (
        <div className="bg-amber-50 ring-1 ring-amber-200 rounded-lg p-4 flex items-start gap-3">
          <AlertCircle size={16} className="text-amber-700 mt-0.5 flex-shrink-0" />
          <div className="text-sm text-stone-700">
            <p style={{ fontWeight: 500 }}>Ingen fredagsrutin ifylld än</p>
            <p className="text-xs text-stone-600 mt-1">Klicka på en person i Personal-fliken och fyll i deras fredagstider.</p>
          </div>
        </div>
      )}

      <div className="bg-white rounded-2xl ring-1 ring-stone-200 p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="display-font text-xl text-stone-800">{dayLabel}{isFriday && hasFridaySetup ? ` · vecka ${currentFridayWeek}` : ''}</h2>
          <div className="flex gap-3 text-xs flex-wrap">
            {departments.map(d => (
              <span key={d.id} className="flex items-center gap-1.5">
                <span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: d.color }} />
                <span className="text-stone-600">{d.name}</span>
              </span>
            ))}
          </div>
        </div>

        <div className="relative h-6 mb-2 ml-32 border-b border-stone-200">
          {ticks.map(m => (
            <div key={m} className="absolute top-0 text-[10px] text-stone-400" style={{ left: `${pctFromMin(m)}%`, transform: 'translateX(-50%)' }}>
              {minToTime(m)}<div className="w-px h-1.5 bg-stone-300 mx-auto mt-0.5" />
            </div>
          ))}
        </div>

        <div className="space-y-1.5">
          {dayData.present.length === 0 && (
            <p className="text-sm text-stone-400 italic py-4 text-center">Ingen personal arbetar denna {isFriday ? 'fredag' : 'dag'}</p>
          )}
          {dayData.present.map(p => {
            const dept = getDept(p.deptId, departments);
            const soft = softColor(dept.color);
            const shiftLabel = isFriday
              ? `${p._friShift[0]}–${p._friShift[1]}`
              : `${p.sched[activeDay][0]}–${p.sched[activeDay][1]}`;
            return (
              <div key={p.id} className="flex items-center group">
                <div className="w-32 pr-3 text-right">
                  <button onClick={() => onEdit(p.id)} className="text-sm text-stone-800 hover:text-stone-900 truncate flex items-center gap-1 ml-auto">
                    <Edit3 size={10} className="opacity-0 group-hover:opacity-50 transition" />{p.name}
                  </button>
                  {p.role && <p className="text-[10px] text-stone-500 truncate">{p.role}</p>}
                </div>
                <div className="flex-1 relative h-7 bg-stone-50 rounded-md cursor-pointer" onClick={() => onEdit(p.id)}>
                  <div className="absolute h-full rounded-md flex items-center px-2 transition-all hover:opacity-90"
                    style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                      backgroundColor: soft, borderLeft: `3px solid ${dept.color}` }}>
                    <span className="text-[11px] truncate text-stone-700" style={{ fontWeight: 500 }}>
                      {shiftLabel}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="mt-6 pt-4 border-t border-stone-100">
          <div className="flex items-center justify-between mb-2">
            <p className="text-xs uppercase tracking-wider text-stone-500">Antal personal per 15 min</p>
            {dayData.gaps.length > 0 ? (
              <span className="text-xs text-orange-600 flex items-center gap-1">
                <AlertCircle size={12} />{dayData.gaps.length} gap mot bemanningskrav
              </span>
            ) : (
              <span className="text-xs text-emerald-600 flex items-center gap-1">
                <CheckCircle2 size={12} />Täcker alla krav
              </span>
            )}
          </div>
          <div className="ml-32 relative h-16 bg-stone-50 rounded-md overflow-hidden">
            {dayData.slots.map(s => {
              const w = 100 / dayData.slots.length;
              const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
              const h = (s.count / maxCount) * 100;
              return <div key={s.start} className="absolute bottom-0" style={{ left: `${left}%`, width: `${w}%`, height: `${h}%`,
                backgroundColor: s.gap ? '#F59E0B' : '#475569', opacity: s.gap ? 0.85 : 0.55 }} />;
            })}
            {dayData.slots.map(s => {
              const left = ((s.start - TIMELINE_START) / TIMELINE_RANGE) * 100;
              const w = 100 / dayData.slots.length;
              const h = (s.min / maxCount) * 100;
              return <div key={`m${s.start}`} className="absolute" style={{ left: `${left}%`, width: `${w}%`,
                bottom: `${h}%`, height: '1px', backgroundColor: '#dc2626', opacity: 0.6 }} />;
            })}
          </div>
          <div className="ml-32 mt-1 flex items-center gap-4 text-[10px] text-stone-500">
            <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: '#475569', opacity: 0.55 }} />Faktisk</span>
            <span className="flex items-center gap-1"><span className="w-2 h-2" style={{ backgroundColor: '#F59E0B', opacity: 0.85 }} />Under min</span>
            <span className="flex items-center gap-1"><span className="w-3 h-px" style={{ backgroundColor: '#dc2626' }} />Krav</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function StaffEditModal({ staff, departments, fridayCycleWeeks, onSave, onClose, onRemove }) {
  const [form, setForm] = useState(() => {
    const cp = JSON.parse(JSON.stringify(staff));
    // Säkerställ att rotationen har rätt längd när modalen öppnas
    if (cp.hasFridayRotation) {
      cp.fridayRotation = resizeRotation(cp.fridayRotation, fridayCycleWeeks);
    }
    return cp;
  });
  const wm = weeklyMinutes(form, fridayCycleWeeks);
  const targetMin = getTargetMin(form);
  const diff = wm - targetMin;
  const off = Math.abs(diff) > 5;
  const dept = getDept(form.deptId, departments);

  // Uppdatera en enskild fredagsvecka i rullen
  const updateFridayWeek = (weekIdx, idx, val) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    const cur = next[weekIdx] || ['',''];
    next[weekIdx] = idx === 0 ? [val, cur[1]] : [cur[0], val];
    if (!next[weekIdx][0] && !next[weekIdx][1]) next[weekIdx] = null;
    setForm({ ...form, fridayRotation: next });
  };
  const setWeekOff = (weekIdx, off) => {
    const next = resizeRotation(form.fridayRotation, fridayCycleWeeks);
    next[weekIdx] = off ? null : ['07:00','15:30'];
    setForm({ ...form, fridayRotation: next });
  };

  const updateShift = (day, idx, val) => {
    const newSched = { ...form.sched };
    if (!newSched[day]) newSched[day] = ['',''];
    newSched[day] = [...newSched[day]];
    newSched[day][idx] = val;
    setForm({ ...form, sched: newSched });
  };
  const toggleDayOff = (day) => {
    const cur = form.daysOff || [];
    setForm({ ...form, daysOff: cur.includes(day) ? cur.filter(d => d !== day) : [...cur, day] });
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(28, 25, 23, 0.4)' }} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>

function Section({ title, children }) {

function Field({ label, children }) {

function Toggle({ checked, onChange, label, hint }) {
  return (
    <div className="flex items-start gap-3">
      <button type="button" onClick={() => onChange(!checked)}
        className={`relative w-9 h-5 rounded-full transition flex-shrink-0 mt-0.5 ${checked ? 'bg-stone-800' : 'bg-stone-300'}`}>
        <span className="absolute top-0.5 w-4 h-4 rounded-full bg-white transition-transform"
          style={{ transform: checked ? 'translateX(18px)' : 'translateX(2px)' }} />

      <div className="cursor-pointer" onClick={() => onChange(!checked)}>

// Editor för dagsspecifika undantag — listar de dagar som har undantag och låter
// användaren lägga till nya. Varje undantag kan sätta valfritt av de fyra fälten.
function DayOverridesEditor({ form, setForm }) {
  const overrides = form.dayOverrides || {};
  const overrideKeys = Object.keys(overrides).filter(k => overrides[k]);
  const availableDays = DAYS.filter(d => !overrideKeys.includes(d.key));

  const FIELDS = [
    { key: 'earliestStart', label: 'Tidigast börja' },
    { key: 'latestStart',   label: 'Måste börja senast' },
    { key: 'earliestEnd',   label: 'Måste jobba minst till' },
    { key: 'latestEnd',     label: 'Senast sluta' },
  ];

  const setField = (dayKey, fieldKey, val) => {
    const next = { ...overrides };
    next[dayKey] = { ...(next[dayKey] || {}) };
    if (val === '' || val == null) delete next[dayKey][fieldKey];
    else next[dayKey][fieldKey] = timeToMin(val);
    // Om alla fält tomma, ta bort dagen helt
    if (Object.keys(next[dayKey]).length === 0) delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  const addOverride = (dayKey) => {
    const next = { ...overrides };
    next[dayKey] = {};
    setForm({ ...form, dayOverrides: next });
  };

  const removeOverride = (dayKey) => {
    const next = { ...overrides };
    delete next[dayKey];
    setForm({ ...form, dayOverrides: next });
  };

  return (
    <div className="space-y-3">
      {overrideKeys.length === 0 && (
        <p className="text-xs text-stone-400 italic">Inga dagsundantag än.</p>
      )}
      {overrideKeys.map(dayKey => {
        const dayLabel = DAYS.find(d => d.key === dayKey)?.label;
        const ov = overrides[dayKey] || {};
        const general = {
          earliestStart: form.earliestStart, latestStart: form.latestStart,
          earliestEnd:   form.earliestEnd,   latestEnd:   form.latestEnd,
        };
        return (
          <div key={dayKey} className="bg-stone-50 rounded-lg p-3 ring-1 ring-stone-200">
            <div className="flex items-center justify-between mb-2">
              <span className="text-sm text-stone-800" style={{ fontWeight: 500 }}>{dayLabel}</span>
              <button type="button" onClick={() => removeOverride(dayKey)}
                className="text-xs text-stone-500 hover:text-red-600 flex items-center gap-1">
                <Trash2 size={12} />Ta bort undantag
              </button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {FIELDS.map(f => {
                const val = ov[f.key];
                const generalVal = general[f.key];
                const isOverriding = val != null;
                return (
                  <div key={f.key}>
                    <label className="text-[10px] text-stone-600 block mb-0.5">
                      {f.label}
                      {!isOverriding && generalVal != null && (
                        <span className="text-stone-400"> (generellt: {minToTime(generalVal)})</span>
                      )}
                    </label>
                    <div className="flex items-center gap-1">
                      <input type="time" className="input flex-1"
                        value={val != null ? minToTime(val) : ''}
                        onChange={e => setField(dayKey, f.key, e.target.value)} />
                      {isOverriding && (
                        <button type="button" onClick={() => setField(dayKey, f.key, '')}
                          className="text-xs text-stone-400 hover:text-stone-700 px-1" title="Ta bort detta fält">×</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
            <p className="text-[10px] text-stone-500 mt-2">Tomt fält = använd den generella regeln för det fältet.</p>
          </div>
        );
      })}
      {availableDays.length > 0 && (
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-stone-500">Lägg till undantag för:</span>
          {availableDays.map(d => (
            <button key={d.key} type="button" onClick={() => addOverride(d.key)}
              className="text-xs px-2.5 py-1 rounded-full bg-stone-100 text-stone-700 hover:bg-stone-200 transition flex items-center gap-1">
              <Plus size={10} />{d.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

              return (
                <button key={i} onClick={() => setPreviewIdx(i)}

                  <p className={`text-[10px] uppercase tracking-wider ${isSelected ? 'text-stone-300' : 'text-stone-500'}`}>Alternativ {i + 1}</p>
                  <h3 className={`display-font text-lg mt-1 ${isSelected ? 'text-white' : 'text-stone-800'}`}>{alt.label}</h3>
                  <p className={`text-xs mt-1 ${isSelected ? 'text-stone-300' : 'text-stone-500'}`}>{alt.desc}</p>
                  <div className="mt-3 pt-3 border-t border-stone-200/30 space-y-1 text-xs">
                    <div className="flex justify-between">

                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Pers. m. tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.peopleOff, currentSummary.peopleOff)} style={{ fontWeight: 500 }}>

                      </span>
                    </div>
                    <div className="flex justify-between">
                      <span className={isSelected ? 'text-stone-300' : 'text-stone-500'}>Total tim-avvik.:</span>
                      <span className={isSelected ? 'text-white' : better(alt.summary.totalHourDev, currentSummary.totalHourDev)} style={{ fontWeight: 500 }}>
                        {minToHM(alt.summary.totalHourDev)}
                      </span>
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          {/* Comparison vs current */}
          <div className="bg-stone-50 rounded-lg p-3 mb-6 text-xs text-stone-600 flex items-center gap-3 flex-wrap">
            <span className="text-stone-500">Nuvarande schema till jämförelse:</span>
            <span><span style={{ fontWeight: 500 }}>{currentSummary.totalGaps}</span> gap</span>

            <span><span style={{ fontWeight: 500 }}>{currentSummary.peopleOff}</span> personer m. tim-avvikelse</span>
            <span>·</span>

      <p className="text-xs uppercase tracking-wider text-stone-500">Förhandsgranskning · ändringar markerade i färg</p>
      {DAYS.map(d => {
        const present = staff.filter(s => s.sched[d.key] && !(s.daysOff || []).includes(d.key))
          .map(s => ({ ...s, startMin: timeToMin(s.sched[d.key][0]), endMin: timeToMin(s.sched[d.key][1]) }))
          .sort((a, b) => a.startMin - b.startMin);
        const slots = computeSlots(staff, d.key, coverage);
        const gaps = slots.filter(s => s.count < s.min).length;
        return (
          <div key={d.key} className="bg-white ring-1 ring-stone-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-2">
              <p className="text-sm text-stone-700" style={{ fontWeight: 500 }}>{d.label}</p>
              <span className={`text-[10px] px-2 py-0.5 rounded ${gaps === 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-orange-50 text-orange-700'}`}>
                {gaps === 0 ? 'Täcker krav' : `${gaps} gap`}
              </span>
            </div>
            <div className="space-y-0.5">
              {present.map(p => {
                const orig = origMap[p.id];
                const origSh = orig.sched[d.key];
                const changed = !origSh || origSh[0] !== p.sched[d.key][0] || origSh[1] !== p.sched[d.key][1];
                const dept = getDept(p.deptId, departments);
                const soft = softColor(dept.color);
                return (
                  <div key={p.id} className="flex items-center text-xs">
                    <span className="w-24 text-right pr-2 text-stone-700 truncate">{p.name}</span>
                    <div className="flex-1 relative h-5 bg-stone-50 rounded">
                      <div className="absolute h-full rounded flex items-center px-1.5"
                        style={{ left: `${pctFromMin(p.startMin)}%`, width: `${pctFromMin(p.endMin) - pctFromMin(p.startMin)}%`,
                          backgroundColor: changed ? '#fef3c7' : soft, borderLeft: `2px solid ${changed ? '#d97706' : dept.color}` }}>
                        <span className="text-[10px] truncate text-stone-700">
                          {p.sched[d.key][0]}–{p.sched[d.key][1]}
                          {changed && <span className="text-amber-700 ml-1">★</span>}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}


// ----- Mount -----
const rootEl = document.getElementById('root');
ReactDOM.createRoot(rootEl).render(React.createElement(FritidsSchemaApp));

</script>
</body>
</html>

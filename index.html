// Bygg lucide-react-stilade komponenter ovanpå lucide UMD.
// lucide UMD exponerar varje ikon som en array av barn-element: [[tag, attrs], [tag, attrs], ...]
// Vi bygger en React-komponent som tar size/className/fill/style etc precis som lucide-react.
(function() {
  const { createElement: h } = React;
  const iconNames = ['AlertCircle', 'Clock', 'Users', 'Calendar', 'CheckCircle2', 'ChevronRight', 'Edit3', 'Sparkles', 'X', 'Plus', 'Trash2', 'Wand2', 'Settings', 'Download', 'Upload', 'Circle', 'HelpCircle', 'ArrowRight'];
  const defaultSvgAttrs = {
    xmlns: 'http://www.w3.org/2000/svg',
    viewBox: '0 0 24 24',
    fill: 'none',
    stroke: 'currentColor',
    strokeWidth: 2,
    strokeLinecap: 'round',
    strokeLinejoin: 'round',
  };
  const icons = {};
  iconNames.forEach(name => {
    icons[name] = function IconComponent(props = {}) {
      const { size = 24, fill, color, className, style, ...rest } = props;
      const iconChildren = window.lucide && window.lucide[name];
      if (!iconChildren || !Array.isArray(iconChildren)) {
        return h('span', { className, style });
      }
      const children = iconChildren.map((child, i) => {
        const [tag, childAttrs] = child;
        // Konvertera kebab-case attrs (stroke-width) → camelCase för React
        const reactAttrs = {};
        Object.entries(childAttrs || {}).forEach(([k, v]) => {
          const reactKey = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
          reactAttrs[reactKey] = v;
        });
        return h(tag, { key: i, ...reactAttrs });
      });
      return h('svg', {
        ...defaultSvgAttrs,
        width: size, height: size,
        fill: fill || defaultSvgAttrs.fill,
        stroke: color || defaultSvgAttrs.stroke,
        className, style,
        ...rest,
      }, ...children);
    };
  });
  window.__icons = icons;
})();
</script>

// Hjälp: räkna ut "soft" pastellvariant från huvudfärg
function softColor(hex) {
  if (!hex || hex.length < 7) return '#f5f5f4';
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const blend = c => Math.round(c * 0.18 + 255 * 0.82);
  const toHex = c => c.toString(16).padStart(2, '0');
  return `#${toHex(blend(r))}${toHex(blend(g))}${toHex(blend(b))}`;
}

// Slå upp en avdelning från id (eller fallback om den raderats)
function getDept(deptId, departments) {

function getDayMeta(dayKey) {
  return DAY_META.find(day => day.key === dayKey) || { key: dayKey, label: dayKey, short: dayKey };

// Returnerar den effektiva tidsbegränsningen för en person på en specifik dag.
// Prioritetsordning: dagsundantag > paritetsundantag (jämn/udda vecka) > generell regel.
function getConstraint(person, dayKey, key, parity) {
  const dayOv = (person.dayOverrides || {})[dayKey];
  if (dayOv && dayOv[key] !== undefined) return dayOv[key];
  if (parity) {
    const parOv = (person.parityOverrides || {})[parity];
    if (parOv && parOv[key] !== undefined) return parOv[key];
  }
  return person[key];
}

// Räkna ut målet i minuter från fullTimeHours + percent
function getTargetMin(person) {
  return Math.round(((person.fullTimeHours ?? 37.5) * 60 * (person.percent ?? 100)) / 100);
}

// Räkna ut en persons fredagspass för en given vecka i cykeln (1-indexerad).
// Modell: varje person har sin EGNA lista av fredagspass (en per vecka i cykeln).
// Det är samma struktur som i den ursprungliga Excel-filen — varje person har sin rad.
function getTemplateFridayShift(fridayTemplateRotation, week, startWeek = 1, cycleWeeks = 8) {
  if (!Array.isArray(fridayTemplateRotation) || fridayTemplateRotation.length === 0) return null;
  const len = fridayTemplateRotation.length;
  const idx = (((week - 1) + ((startWeek || 1) - 1)) % len + len) % len;
  return fridayTemplateRotation[idx] || null;
}

function hasFridayTemplateOverride(person, week) {
  return Object.prototype.hasOwnProperty.call(person.fridayTemplateOverrides || {}, String(week));
}

function getFridayShift(person, week, cycleWeeks, fridayTemplateRotation = []) {
  if (!person.hasFridayRotation && person.fridayShift) return person.fridayShift;
  if (person.hasFridayRotation && person.fridayUseTemplate) {
    if (hasFridayTemplateOverride(person, week)) {
      return (person.fridayTemplateOverrides || {})[String(week)] || null;
    }
    return getTemplateFridayShift(fridayTemplateRotation, week, person.fridayTemplateStartWeek || 1, cycleWeeks);
  }
  if (person.hasFridayRotation && Array.isArray(person.fridayRotation) && person.fridayRotation.length > 0) {
    const len = person.fridayRotation.length;
    const idx = (((week - 1) % len) + len) % len;
    return person.fridayRotation[idx] || null;
  }
  return null;
}

// Snittlig fredagstid över cykeln (för veckotim-räkning)
function avgFridayMinutes(person, cycleWeeks, fridayTemplateRotation = []) {
  if (!person.hasFridayRotation && person.fridayShift) return dayMinutes(person.fridayShift);
  if (!person.hasFridayRotation) return 0;
  if (!person.fridayUseTemplate && (!Array.isArray(person.fridayRotation) || person.fridayRotation.length === 0)) return 0;
  let sum = 0;
  for (let w = 1; w <= cycleWeeks; w++) {
    const sh = getFridayShift(person, w, cycleWeeks, fridayTemplateRotation);
    if (sh) sum += dayMinutes(sh);
  }
  return sum / cycleWeeks;
}

// Justera längden på en persons rotation-array (fyll med null eller trunkera)
function resizeRotation(rotation, length) {
  const cur = Array.isArray(rotation) ? rotation : [];
  const out = new Array(length).fill(null);
  for (let i = 0; i < Math.min(cur.length, length); i++) out[i] = cur[i];
  return out;
}

function buildEffectiveFridayRotation(person, cycleWeeks, fridayTemplateRotation = []) {
  return Array.from({ length: cycleWeeks }, (_, idx) => getFridayShift(person, idx + 1, cycleWeeks, fridayTemplateRotation));
}

function normalizePassDays(days) {
  const source = Array.isArray(days) && days.length > 0 ? days : WEEKDAY_KEYS;
  return Array.from(new Set(source.filter(day => WEEKDAY_KEYS.includes(day))));
}

function normalizePass(pass, fallbackDays = WEEKDAY_KEYS) {
  const days = normalizePassDays(pass?.days || fallbackDays);
  const start = asNumber(pass?.start, 480);
  const end = asNumber(pass?.end, 960);
  const safeStart = clamp(roundToQuarter(start), 330, 1020);
  const safeEnd = clamp(roundToQuarter(end), safeStart + 60, 1080);
  return {
    id: pass?.id || `pass-${Math.random().toString(36).slice(2, 8)}`,
    name: pass?.name || `${minToTime(safeStart)}–${minToTime(safeEnd)}`,
    start: safeStart,
    end: safeEnd,
    days,
    deptId: pass?.deptId || '',
  };
}

function normalizePassBank(passBank) {
  const normalized = (Array.isArray(passBank) ? passBank : initialPassBank).map(pass => normalizePass(pass));
  return normalized.length > 0 ? normalized : initialPassBank.map(pass => normalizePass(pass));
}

function passToShift(pass) {
  if (!pass) return null;
  return [minToTime(pass.start), minToTime(pass.end)];
}

function passDuration(pass) {
  return Math.max(0, (pass?.end || 0) - (pass?.start || 0));
}
function shiftMatchesPass(shift, pass) {
  if (!shift || !pass) return false;
  return shift[0] === minToTime(pass.start) && shift[1] === minToTime(pass.end);
}

    fridayShift: spec.hasFridayRotation === false ? (spec.fridayShift || null) : null,
    allowedPassIds: spec.allowedPassIds || [],
    sched: spec.sched || {},
  }));
}

function normalizeCoverageBlock(block, fallbackDeptId = '') {
  const scopeType = block?.scopeType === COVERAGE_DEPARTMENT ? COVERAGE_DEPARTMENT : COVERAGE_SHARED;
  return {
    id: block?.id ?? Math.random(),
    start: block?.start ?? 480,

    scopeType,

}

function normalizeCoverageBlocks(blocks, departments = []) {
  const fallbackDeptId = departments[0]?.id || '';
  return (Array.isArray(blocks) ? blocks : []).map(block => normalizeCoverageBlock(block, fallbackDeptId));
}

function blockMatchesScope(block, scopeType, deptId = null) {
  if (scopeType === COVERAGE_DEPARTMENT) {
    return block.scopeType === COVERAGE_DEPARTMENT && block.deptId === deptId;
  }
  return block.scopeType !== COVERAGE_DEPARTMENT;
}

// Konvertera block till 15-min slots som resten av koden använder
function blocksToSlots(blocks, scopeType = COVERAGE_SHARED, deptId = null) {
  const arr = [];
  for (let m = 330; m < 1080; m += 15) {
    let min = 0;
    for (const b of blocks) {
      if (!blockMatchesScope(b, scopeType, deptId)) continue;
      if (m >= b.start && m < b.end) { min = b.min; break; }
    }
    arr.push({ start: m, min });
  }
  return arr;
}

function buildCoverageScopes(blocks, departments) {
  const normalized = normalizeCoverageBlocks(blocks, departments);
  const sharedBlocks = normalized.filter(b => b.scopeType === COVERAGE_SHARED);
  const scopes = [];

  if (sharedBlocks.length > 0 || normalized.length === 0) {
    scopes.push({
      key: COVERAGE_SHARED,
      label: 'Gemensam bemanning',
      scopeType: COVERAGE_SHARED,
      deptId: null,
      color: '#475569',
      slots: blocksToSlots(normalized, COVERAGE_SHARED),
    });
  }

  departments.forEach(dept => {
    scopes.push({
      key: dept.id,
      label: dept.name,
      scopeType: COVERAGE_DEPARTMENT,
      deptId: dept.id,
      color: dept.color,
      slots: blocksToSlots(normalized, COVERAGE_DEPARTMENT, dept.id),
    });
  });

  return scopes;
}

function timeToMin(t) { if (!t) return null; const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function minToTime(m) { const h = Math.floor(m / 60); const mm = m % 60; return `${String(h).padStart(2, '0')}:${String(mm).padStart(2, '0')}`; }
function minToHM(min) { const h = Math.floor(Math.abs(min) / 60); const m = Math.abs(min) % 60; const sign = min < 0 ? '-' : ''; return `${sign}${h} h ${m} min`; }

function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }
function roundToQuarter(min) { return Math.round(min / 15) * 15; }
function asNumber(value, fallback = null) {

}

}

  const start = isTimeString(shift[0]) ? shift[0] : '';
  const end = isTimeString(shift[1]) ? shift[1] : '';
  return start && end ? [start, end] : null;
}
function normalizeWeekSched(sched) {
  const next = {};
  DAYS.forEach(d => {
    const sh = normalizeShift(sched?.[d.key]);

  });
  return next;
}
function normalizeConstraintSet(set) {
  const next = {};
  CONSTRAINT_KEYS.forEach(key => {
    const value = asNumber(set?.[key], null);
    if (value != null) next[key] = value;
  });
  return next;
}
function normalizeDayOverrides(dayOverrides) {
  const next = {};
  DAYS.forEach(d => {
    const clean = normalizeConstraintSet(dayOverrides?.[d.key]);
    if (Object.keys(clean).length > 0) next[d.key] = clean;

}
function normalizeParityOverrides(parityOverrides) {
  const next = {};
  ['even', 'odd'].forEach(key => {

}
function normalizeFridayTemplateOverrides(overrides, cycleWeeks = 8) {
  const next = {};

    if (!Number.isFinite(week) || week < 1 || week > cycleWeeks) return;
    if (shift === null) {
      next[String(week)] = null;
      return;
    }
    const cleanShift = normalizeShift(shift);
    if (cleanShift) next[String(week)] = cleanShift;
  });
  return next;
}
function normalizeAllowedPassIds(allowedPassIds) {

}
function getStrictConstraints(person, dayKey) {
  const evals = ['even', 'odd'].map(parity => ({

    latestStart:   getConstraint(person, dayKey, 'latestStart',   parity),
    earliestEnd:   getConstraint(person, dayKey, 'earliestEnd',   parity),

    latestStart:   Math.min(...evals.map(e => e.latestStart   ?? Infinity)),
    earliestEnd:   Math.max(...evals.map(e => e.earliestEnd   ?? -Infinity)),

}
function normalizePerson(person, cycleWeeks = 8) {

}

function getEligiblePassesForDay(person, dayKey, passBank = []) {
  if ((person.daysOff || []).includes(dayKey)) return [];
  const allowedIds = new Set(getAllowedPassIdsForPerson(person, passBank));
  return normalizePassBank(passBank).filter(pass => {
    if (!allowedIds.has(pass.id)) return false;
    if (!pass.days.includes(dayKey)) return false;
    if (pass.deptId && pass.deptId !== person.deptId) return false;
    return isShiftLegal(person, dayKey, passToShift(pass));
  });

function getSuggestedDayMinutes(person, cycleWeeks, fridayTemplateRotation = []) {
  const explicitDayMinutes = DAYS
    .map(d => normalizeShift(person.sched?.[d.key]))
    .filter(Boolean)
    .map(dayMinutes)
    .filter(Number.isFinite);
  if (explicitDayMinutes.length > 0) {
    const avg = explicitDayMinutes.reduce((sum, min) => sum + min, 0) / explicitDayMinutes.length;
    return clamp(roundToQuarter(avg), 60, 600);
  }
  const workingDays = DAYS.filter(d => !(person.daysOff || []).includes(d.key)).length || DAYS.length;
  const fridayMinutes = avgFridayMinutes(person, cycleWeeks, fridayTemplateRotation);
  const remaining = Math.max(workingDays * 60, getTargetMin(person) - fridayMinutes);
  return clamp(roundToQuarter(remaining / workingDays), 60, 600);
}

function buildFallbackShift(person, dayKey, cycleWeeks, fridayTemplateRotation = []) {
  if ((person.daysOff || []).includes(dayKey)) return null;
  const desiredMinutes = getSuggestedDayMinutes(person, cycleWeeks, fridayTemplateRotation);
  const preferredStart = person.onlyAfternoons ? 13 * 60 : 8 * 60;
  const durationOffsets = [0, 15, -15, 30, -30, 45, -45, 60, -60, 90, -90, 120, -120];
  let best = null;

  for (let start = 330; start <= 1020; start += 15) {
    for (const offset of durationOffsets) {
      const length = clamp(roundToQuarter(desiredMinutes + offset), 60, 750);
      const end = start + length;
      if (end > 1080) continue;
      const candidate = [minToTime(start), minToTime(end)];
      if (!isShiftLegal(person, dayKey, candidate)) continue;
      const score = Math.abs(start - preferredStart) + Math.abs(length - desiredMinutes) * 2;
      if (!best || score < best.score) {
        best = { score, shift: candidate };
      }
    }
  }

  if (best) return best.shift;

  const strict = getStrictConstraints(person, dayKey);
  const fallbackStart = clamp(
    person.onlyAfternoons ? 12 * 60 : 8 * 60,
    Number.isFinite(strict.earliestStart) ? strict.earliestStart : 330,
    Number.isFinite(strict.latestStart) ? strict.latestStart : 1020
  );
  const fallbackEnd = clamp(
    fallbackStart + desiredMinutes,
    Number.isFinite(strict.earliestEnd) ? strict.earliestEnd : fallbackStart + 60,
    Number.isFinite(strict.latestEnd) ? strict.latestEnd : 1080
  );
  const fallback = fallbackEnd - fallbackStart >= 60 ? [minToTime(fallbackStart), minToTime(fallbackEnd)] : null;
  return fallback && isShiftLegal(person, dayKey, fallback) ? fallback : null;
}

function buildSuggestedShift(person, dayKey, cycleWeeks, fridayTemplateRotation = [], passBank = []) {
  const eligiblePasses = getEligiblePassesForDay(person, dayKey, passBank);
  if (eligiblePasses.length > 0) {
    const desiredMinutes = getSuggestedDayMinutes(person, cycleWeeks, fridayTemplateRotation);
    const preferredStart = person.onlyAfternoons ? 13 * 60 : 8 * 60;
    const ranked = eligiblePasses
      .map(pass => ({
        pass,
        shift: passToShift(pass),
        score: Math.abs(pass.start - preferredStart) + Math.abs(passDuration(pass) - desiredMinutes) * 2,
      }))
      .sort((a, b) => a.score - b.score || a.pass.start - b.pass.start);

function preparePersonForUse(person, cycleWeeks = 8, fridayTemplateRotation = [], passBank = []) {
